// ─── Helpers ─────────────────────────────────────────────────────────────────
function formatBytes(bytes) {
  if (!bytes || bytes === 0) return '0 B';
  const k = 1024, sizes = ['B','KB','MB','GB','TB'];
  const i = Math.floor(Math.log(bytes) / Math.log(k));
  return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
}

function api(path, options = {}) {
  return fetch(path, {
    headers: { 'Content-Type': 'application/json', ...(options.headers || {}) },
    ...options,
    body: options.body ? JSON.stringify(options.body) : undefined,
  }).then(r => r.json());
}

// ─── Confirm Dialog ───────────────────────────────────────────────────────────
function ConfirmDialog({ message, onConfirm, onCancel, lang }) {
  const t = T[lang].common;

  useEffect(() => {
    const handleKeyDown = (e) => {
      if (e.key === 'Escape') {
        onCancel();
      }
    };
    window.addEventListener('keydown', handleKeyDown);
    return () => window.removeEventListener('keydown', handleKeyDown);
  }, [onCancel]);

  return (
    <div className="modal-backdrop" style={{zIndex: 200}}>
      <div className="glass" role="dialog" aria-modal="true" style={{padding: 24, maxWidth: 380, width: '100%', textAlign: 'center'}}>
        <p style={{marginBottom: 20, fontSize: 15}}>{message}</p>
        <div style={{display:'flex', gap: 10, justifyContent:'center'}}>
          <button className="grad-btn" style={{padding:'8px 20px'}} onClick={onConfirm}>{t.confirm}</button>
          <button autoFocus style={{padding:'8px 20px', background:'rgba(255,255,255,0.07)', border:'1px solid rgba(255,255,255,0.1)', borderRadius:8, color:'var(--text)', cursor:'pointer'}} onClick={onCancel}>{t.cancel}</button>
        </div>
      </div>
    </div>
  );
}

// ─── Toast ────────────────────────────────────────────────────────────────────
function Toast({ toasts }) {
  return (
    <div style={{position:'fixed', bottom: 24, right: 24, zIndex: 300, display:'flex', flexDirection:'column', gap: 8}}>
      {toasts.map(t => (
        <div key={t.id} className="glass" style={{padding:'10px 16px', fontSize:13, borderLeft:`3px solid ${t.type==='error'?'#ef4444':t.type==='success'?'#22c55e':'#6366f1'}`, minWidth:220, maxWidth:340}}>
          {t.message}
        </div>
      ))}
    </div>
  );
}

// ─── Status Bar ───────────────────────────────────────────────────────────────
function StatusBar({ movies, genres, studios, platforms, lang }) {
  const t = T[lang].statusBar;
  const total = movies.length;
  const allLinks = movies.flatMap(m => m.hardlinks || []);
  const ok = allLinks.filter(h => h.exists).length;
  const missing = allLinks.filter(h => !h.exists).length;
  const activeGenres = genres.length;
  const activeStudios = studios.length;
  const activePlatforms = platforms.length;

  const items = [
    { label: t.total, value: total, color: '#818cf8' },
    { label: t.ok, value: ok, color: '#4ade80' },
    { label: t.missing, value: missing, color: '#f87171' },
    { label: t.genres, value: activeGenres, color: '#c084fc' },
    { label: t.studios, value: activeStudios, color: '#2dd4bf' },
    { label: t.platforms, value: activePlatforms, color: '#facc15' },
  ];

  return (
    <div className="glass" style={{padding:'10px 20px', marginBottom:16, display:'flex', gap:24, flexWrap:'wrap', alignItems:'center'}}>
      {items.map(item => (
        <div key={item.label} style={{display:'flex', alignItems:'center', gap:8}}>
          <span style={{fontSize:20, fontWeight:700, color:item.color}}>{item.value}</span>
          <span style={{fontSize:12, color:'var(--muted)'}}>{item.label}</span>
        </div>
      ))}
    </div>
  );
}

// ─── Movie Detail Modal ───────────────────────────────────────────────────────
function MovieDetailModal({ movie, onClose, onRefresh, lang, addToast }) {
  const t = T[lang].modal;
  const [confirm, setConfirm] = useState(null);
  const [running, setRunning] = useState(false);

  useEffect(() => {
    const handleKeyDown = (e) => {
      if (e.key === 'Escape' && !confirm) {
        onClose();
      }
    };
    window.addEventListener('keydown', handleKeyDown);
    return () => window.removeEventListener('keydown', handleKeyDown);
  }, [onClose, confirm]);

  if (!movie) return null;

  const genreLinks = (movie.hardlinks || []).filter(h => h.type === 'genre');
  const studioLinks = (movie.hardlinks || []).filter(h => h.type === 'studio');
  const platformLinks = (movie.hardlinks || []).filter(h => h.type === 'platform');

  async function handleCreateLinks() {
    setRunning(true);
    try {
      await api('/api/run', { method: 'POST', body: { movie_paths: [movie.path] } });
      addToast({ message: 'Hardlinks créés !', type: 'success' });
      onRefresh();
      onClose();
    } catch(e) { addToast({ message: 'Erreur: ' + e.message, type: 'error' }); }
    setRunning(false);
  }

  async function handleDeleteHardlink(link) {
    try {
      await api('/api/delete-hardlink', { method: 'POST', body: { folderName: movie.folderName, targetFolder: link.folder } });
      addToast({ message: 'Hardlink supprimé', type: 'success' });
      onRefresh();
    } catch(e) { addToast({ message: 'Erreur: ' + e.message, type: 'error' }); }
  }

  async function handleDeleteMovie() {
    try {
      await api('/api/delete-movie', { method: 'POST', body: { sourcePath: movie.path, folderName: movie.folderName, title: movie.title } });
      addToast({ message: 'Film supprimé', type: 'success' });
      onRefresh();
      onClose();
    } catch(e) { addToast({ message: 'Erreur: ' + e.message, type: 'error' }); }
  }

  function HardlinkSection({ title, links }) {
    if (!links.length) return null;
    return (
      <div style={{marginBottom:16}}>
        <h4 style={{fontSize:13, fontWeight:600, color:'var(--muted)', marginBottom:8, textTransform:'uppercase', letterSpacing:'0.05em'}}>{title}</h4>
        {links.map((link, i) => (
          <div key={i} style={{display:'flex', alignItems:'center', justifyContent:'space-between', padding:'6px 10px', background:'rgba(255,255,255,0.03)', borderRadius:6, marginBottom:4}}>
            <span style={{fontSize:13}}>{link.genre || link.folder}</span>
            <div style={{display:'flex', alignItems:'center', gap:8}}>
              {link.exists
                ? <span className="badge badge-green" style={{fontSize:11}}>{t.ok}</span>
                : <span className="badge badge-yellow" style={{fontSize:11}}>{t.missing}</span>
              }
              <button
                onClick={() => setConfirm({ msg: t.confirmHardlinkDel, action: () => handleDeleteHardlink(link) })}
                style={{background:'rgba(239,68,68,0.15)', border:'1px solid rgba(239,68,68,0.3)', color:'#f87171', padding:'3px 8px', borderRadius:6, fontSize:11, cursor:'pointer'}}
              >{t.delete}</button>
            </div>
          </div>
        ))}
      </div>
    );
  }

  return (
    <div className="modal-backdrop" onClick={e => e.target === e.currentTarget && onClose()}>
      <div className="modal-box" role="dialog" aria-modal="true" style={{padding:0}}>
        <div style={{display:'flex', gap:0}}>
          {/* Left: Poster */}
          <div style={{width:200, flexShrink:0}}>
            <img src={movie.poster || 'https://via.placeholder.com/200x300?text=No+Poster'} alt={movie.title}
              style={{width:'100%', height:'100%', objectFit:'cover', borderRadius:'16px 0 0 16px', display:'block', minHeight:300}} />
          </div>
          {/* Right: Info */}
          <div style={{flex:1, padding:24, overflowY:'auto'}}>
            <div style={{display:'flex', justifyContent:'space-between', alignItems:'flex-start', marginBottom:12}}>
              <div>
                <h2 style={{margin:'0 0 4px', fontSize:20, fontWeight:700}}>{movie.title}</h2>
                <span style={{color:'var(--muted)', fontSize:14}}>{movie.folderName?.match(/\((\d{4})\)/)?.[1] || ''}</span>
              </div>
              <button autoFocus onClick={onClose} style={{background:'rgba(255,255,255,0.07)', border:'none', color:'var(--muted)', padding:'4px 10px', borderRadius:6, cursor:'pointer', fontSize:13}}>{t.close}</button>
            </div>

            {/* Badges */}
            <div style={{display:'flex', flexWrap:'wrap', gap:4, marginBottom:12}}>
              {movie.jellystatEnabled && (
                <span className={`badge ${movie.watchCount > 0 ? 'badge-green' : 'badge-gray'}`}>
                  {movie.watchCount > 0 ? t.seen : t.notSeen} {movie.watchCount > 0 && `(${movie.watchCount})`}
                </span>
              )}
              {(movie.genres || []).map(g => <span key={g} className="badge badge-blue">{g}</span>)}
              {movie.studio && <span className="badge badge-purple">{movie.studio}</span>}
              {(movie.platforms || []).map(p => <span key={p} className="badge badge-teal">{p}</span>)}
            </div>

            {/* Meta */}
            <div style={{display:'flex', gap:16, marginBottom:16, fontSize:13, color:'var(--muted)'}}>

            {/* Action Buttons */}

              >{t.deleteMovie}</button>
            </div>
          </div>
        </div>
      </div>
      {confirm && <ConfirmDialog message={confirm.msg} lang={lang} onConfirm={() => { confirm.action(); setConfirm(null); }} onCancel={() => setConfirm(null)} />}
    </div>
  );
}

// ─── Library Tab ──────────────────────────────────────────────────────────────
function LibraryTab({ movies, genres, studios, platforms, loading, onRefresh, lang, addToast }) {
  const t = T[lang].library;
  const [search, setSearch] = useState('');
  const [filterGenre, setFilterGenre] = useState('');
  const [filterStudio, setFilterStudio] = useState('');
  const [filterPlatform, setFilterPlatform] = useState('');
  const [missingOnly, setMissingOnly] = useState(false);
  const [selected, setSelected] = useState(new Set());
  const [detailMovie, setDetailMovie] = useState(null);
  const [running, setRunning] = useState(false);

  const filtered = useMemo(() => {
    return movies.filter(m => {
      if (search && !m.title.toLowerCase().includes(search.toLowerCase())) return false;
      if (filterGenre && !(m.genres||[]).includes(filterGenre)) return false;
      if (filterStudio && m.studio !== filterStudio) return false;
      if (filterPlatform && !(m.platforms||[]).includes(filterPlatform)) return false;
      if (missingOnly) {
        const hasMissing = (m.hardlinks||[]).some(h => !h.exists);
        if (!hasMissing) return false;
      }
      return true;
    });
  }, [movies, search, filterGenre, filterStudio, filterPlatform, missingOnly]);

  function toggleSelect(path) {
    setSelected(prev => {
      const n = new Set(prev);
      n.has(path) ? n.delete(path) : n.add(path);
      return n;
    });
  }

  function selectAll() { setSelected(new Set(filtered.map(m => m.path))); }
  function deselectAll() { setSelected(new Set()); }

  async function handleCreateLinks() {
    if (!selected.size) return;
    setRunning(true);
    try {
      await api('/api/run', { method: 'POST', body: { movie_paths: Array.from(selected) } });
      addToast({ message: `Hardlinks créés pour ${selected.size} film(s)`, type: 'success' });
      setSelected(new Set());
      onRefresh();
    } catch(e) { addToast({ message: 'Erreur: ' + e.message, type: 'error' }); }
    setRunning(false);
  }

  async function handleScanDisk() {
    setRunning(true);
    try {
      addToast({ message: 'Lancement du scan complet du disque...', type: 'info' });
      await onRefresh(true);
      addToast({ message: 'Scan complet terminé', type: 'success' });
    } catch(e) { addToast({ message: 'Erreur: ' + e.message, type: 'error' }); }
    setRunning(false);
  }

  function getCardStatus(movie) {
    const links = movie.hardlinks || [];
    if (!links.length) return 'none';
    if (links.every(h => h.exists)) return 'ok';
    if (links.some(h => !h.exists)) return 'partial';
    return 'missing';
  }

  return (
    <div>
      {/* Filters */}
      <div style={{display:'flex', gap:10, marginBottom:16, flexWrap:'wrap', alignItems:'center'}}>
        <input type="search" aria-label={t.search} value={search} onChange={e => setSearch(e.target.value)} placeholder={t.search} style={{flex:'1 1 200px', minWidth:140}} />
        <select aria-label={t.allGenres} value={filterGenre} onChange={e => setFilterGenre(e.target.value)} style={{minWidth:130}}>
          <option value="">{t.allGenres}</option>
          {genres.map(g => <option key={g.name||g} value={g.name||g}>{g.name||g}</option>)}
        </select>
        <select aria-label={t.allStudios} value={filterStudio} onChange={e => setFilterStudio(e.target.value)} style={{minWidth:130}}>
          <option value="">{t.allStudios}</option>
          {studios.map(s => <option key={s.name||s} value={s.name||s}>{s.name||s}</option>)}
        </select>
        <select aria-label={t.allPlatforms} value={filterPlatform} onChange={e => setFilterPlatform(e.target.value)} style={{minWidth:150}}>
          <option value="">{t.allPlatforms}</option>
          {platforms.map(p => <option key={p.name||p} value={p.name||p}>{p.name||p}</option>)}
        </select>
        <label style={{display:'flex', alignItems:'center', gap:6, fontSize:13, cursor:'pointer', color: missingOnly ? '#818cf8' : 'var(--muted)'}}>
          <input type="checkbox" checked={missingOnly} onChange={e => setMissingOnly(e.target.checked)} style={{width:14, height:14}} />
          {t.missingOnly}
        </label>
      </div>

      {/* Toolbar */}
      <div style={{display:'flex', gap:10, marginBottom:16, alignItems:'center', flexWrap:'wrap'}}>
        <button onClick={selectAll} style={{padding:'6px 12px', fontSize:12, background:'rgba(255,255,255,0.06)', border:'1px solid var(--border)', borderRadius:6, color:'var(--text)', cursor:'pointer'}}>{t.selectAll}</button>
        <button onClick={deselectAll} style={{padding:'6px 12px', fontSize:12, background:'rgba(255,255,255,0.06)', border:'1px solid var(--border)', borderRadius:6, color:'var(--text)', cursor:'pointer'}}>{t.deselectAll}</button>
        {selected.size > 0 && (
          <span style={{fontSize:13, color:'#818cf8'}}>{selected.size} {t.selected}</span>
        )}
        <div style={{marginLeft:'auto', display:'flex', gap:8}}>
          <button className="grad-btn" style={{padding:'7px 14px', fontSize:13}} onClick={handleCreateLinks} disabled={!selected.size || running} title={!selected.size ? t.selectAll : ''}>
            {running ? '…' : t.createLinks}
          </button>
          <button onClick={handleScanDisk} disabled={running} style={{padding:'7px 14px', fontSize:13, background:'rgba(255,255,255,0.07)', border:'1px solid var(--border)', borderRadius:8, color:'var(--text)', cursor:'pointer'}}>
            {t.scanDisk}
          </button>
        </div>
      </div>

      {/* Grid */}
      {loading ? (
        <div style={{textAlign:'center', padding:60, color:'var(--muted)'}}>{t.loading}</div>
      ) : !filtered.length ? (
        <div style={{textAlign:'center', padding:60, color:'var(--muted)'}}>
          <div style={{marginBottom:16}}>{t.noMovies}</div>
          {(search || filterGenre || filterStudio || filterPlatform || missingOnly) && (
            <button onClick={() => { setSearch(''); setFilterGenre(''); setFilterStudio(''); setFilterPlatform(''); setMissingOnly(false); }} className="grad-btn" style={{padding:'8px 16px', fontSize:14}}>{t.clearFilters}</button>
          )}
        </div>
      ) : (
        <div style={{display:'grid', gridTemplateColumns:'repeat(auto-fill, minmax(130px, 1fr))', gap:10}}>
          {filtered.map(movie => {
            const status = getCardStatus(movie);
            const isSelected = selected.has(movie.path);
            return (
              <div key={movie.path} className="movie-card" style={{border: isSelected ? '2px solid #6366f1' : '2px solid transparent'}}
                tabIndex={0} role="button"
                onClick={() => setDetailMovie(movie)}
                onKeyDown={(e) => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); setDetailMovie(movie); } }}
              >
                {/* Checkbox overlay */}
                <div className="checkbox-overlay" onClick={e => { e.stopPropagation(); toggleSelect(movie.path); }}>
                  <input type="checkbox" aria-label={`Sélectionner ${movie.title}`} checked={isSelected} onChange={() => {}} style={{width:16, height:16, cursor:'pointer', accentColor:'#6366f1'}} />
                </div>
                {/* Status dot */}
                <div style={{position:'absolute', top:6, right:6, zIndex:10}}>
                  <span className="status-dot" style={{background: status==='ok'?'#22c55e':status==='partial'?'#eab308':status==='missing'?'#ef4444':'#64748b'}}></span>
                </div>
                <img
                  src={movie.poster || 'https://via.placeholder.com/130x195?text=' + encodeURIComponent(movie.title)}
                  alt={movie.title}
                  onError={e => { e.target.src = 'https://via.placeholder.com/130x195?text=No+Poster'; }}
                />
                <div className="overlay"></div>
                <div className="card-info">
                  <p style={{margin:0, fontSize:10, fontWeight:600, lineHeight:1.3, color:'white'}}>{movie.title}</p>
                  {movie.jellystatEnabled && (
                    <p style={{margin:'4px 0 0', fontSize:9, color: movie.watchCount > 0 ? '#4ade80' : '#94a3b8'}}>
                      {movie.watchCount > 0 ? T[lang].modal.seen : T[lang].modal.notSeen}
                    </p>
                  )}
                </div>
              </div>
            );
          })}
        </div>
      )}

      {detailMovie && (
        <MovieDetailModal
          movie={detailMovie}
          onClose={() => setDetailMovie(null)}
          onRefresh={onRefresh}
          lang={lang}
          addToast={addToast}
        />
      )}
    </div>
  );
}

// ─── Stats Tab ────────────────────────────────────────────────────────────────
function StatsTab({ lang, addToast }) {
  const t = T[lang].stats;
  const [stats, setStats] = useState(null);
  const [loading, setLoading] = useState(false);

  async function fetchStats() {
    setLoading(true);
    try {
      const data = await api('/api/stats');
      setStats(data);
    } catch(e) { addToast({ message: 'Erreur stats: ' + e.message, type: 'error' }); }
    setLoading(false);
  }

  function BreakdownTable({ data, title }) {
    if (!data || !data.length) return null;
    const maxCount = Math.max(...data.map(r => r.count || 0), 1);
    return (
      <div className="glass" style={{padding:20, marginBottom:16}}>
        <h3 style={{margin:'0 0 14px', fontSize:15, fontWeight:600}}>{title}</h3>
        <table style={{width:'100%', borderCollapse:'collapse', fontSize:13}}>
          <thead>

              <th style={{textAlign:'left', padding:'6px 8px', fontWeight:500}}>{t.name}</th>
              <th style={{textAlign:'right', padding:'6px 8px', fontWeight:500}}>{t.count}</th>
              <th style={{textAlign:'right', padding:'6px 8px', fontWeight:500}}>{t.size}</th>
              <th style={{textAlign:'right', padding:'6px 8px', fontWeight:500}}>{t.linkedCol}</th>
              <th style={{textAlign:'left', padding:'6px 8px', fontWeight:500, minWidth:120}}>{t.progress}</th>
            </tr>
          </thead>
          <tbody>
            {data.map((row, i) => {
              const pct = row.count ? Math.round((row.linked / row.count) * 100) : 0;
              return (
                <tr key={i} style={{borderTop:'1px solid var(--border)'}}>
                  <td style={{padding:'8px 8px'}}>{row.name}</td>
                  <td style={{textAlign:'right', padding:'8px 8px'}}>{row.count}</td>
                  <td style={{textAlign:'right', padding:'8px 8px', color:'var(--muted)'}}>{formatBytes(row.totalSize)}</td>

                    <div style={{display:'flex', alignItems:'center', gap:8}}>
                      <div className="progress-bar" style={{flex:1}}>
                        <div className="progress-fill" style={{width: pct + '%'}}></div>
                      </div>
                      <span style={{fontSize:11, color:'var(--muted)', minWidth:32, textAlign:'right'}}>{pct}%</span>
                    </div>

                </tr>
              );
            })}

        </table>
      </div>
    );
  }

  return (
    <div>
      <div style={{display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:20}}>
        <h2 style={{margin:0, fontSize:18}}>{t.title}</h2>
        <button className="grad-btn" style={{padding:'8px 18px', fontSize:13}} onClick={fetchStats} disabled={loading}>
          {loading ? t.loading : t.fetch}
        </button>
      </div>

      {stats && (
        <>
          {/* Summary Cards */}
          <div style={{display:'grid', gridTemplateColumns:'repeat(auto-fit, minmax(160px, 1fr))', gap:12, marginBottom:24}}>
            {[
              { label: t.totalMovies, value: stats.total, color: '#818cf8' },
              { label: t.totalSize, value: formatBytes(stats.totalSize), color: '#c084fc' },
              { label: t.linked, value: stats.linked, color: '#4ade80' },
              { label: t.missing, value: stats.missing, color: '#f87171' },
            ].map(card => (
              <div key={card.label} className="glass" style={{padding:20, textAlign:'center'}}>
                <div style={{fontSize:28, fontWeight:700, color:card.color}}>{card.value}</div>
                <div style={{fontSize:12, color:'var(--muted)', marginTop:4}}>{card.label}</div>
              </div>
            ))}
          </div>

          <BreakdownTable data={stats.byGenre} title={t.byGenre} />
          <BreakdownTable data={stats.byStudio} title={t.byStudio} />
          <BreakdownTable data={stats.byPlatform} title={t.byPlatform} />
        </>
      )}

      {!stats && !loading && (
        <div className="glass" style={{padding:40, textAlign:'center', color:'var(--muted)'}}>
          Cliquez sur "{t.fetch}" pour calculer les statistiques
        </div>
      )}
    </div>
  );
}

// ─── Issues Tab ───────────────────────────────────────────────────────────────
function IssuesTab({ lang, addToast }) {
  const t = T[lang].issues;
  const [issues, setIssues] = useState(null);
  const [loading, setLoading] = useState(false);
  const [ignored, setIgnored] = useState([]);

  useEffect(() => {
    fetchIgnored();
    fetchIssues();
  }, []);

  async function fetchIgnored() {
    try {
      const data = await api('/api/ignore');
      if (data && !Array.isArray(data)) {
        const flat = [];
        Object.keys(data).forEach(key => {
          (data[key] || []).forEach(name => {
            flat.push({ type: key, name });
          });
        });
        setIgnored(flat);
      } else {
        setIgnored(data || []);
      }
    } catch(e) {}
  }

  async function fetchIssues() {
    setLoading(true);
    try {
      const data = await api('/api/duplicates');
      setIssues(data);
    } catch(e) { addToast({ message: 'Erreur: ' + e.message, type: 'error' }); }
    setLoading(false);
  }

  async function ignoreItem(type, name) {
    try {
      await api('/api/ignore', { method: 'POST', body: { type, name } });
      addToast({ message: 'Ignoré', type: 'success' });
      fetchIgnored();
      fetchIssues();
    } catch(e) { addToast({ message: 'Erreur: ' + e.message, type: 'error' }); }
  }

  async function unignoreItem(type, name) {
    try {
      await fetch(`/api/ignore/${type}/${encodeURIComponent(name)}`, { method: 'DELETE' });
      addToast({ message: 'Réactivé', type: 'success' });
      fetchIgnored();
    } catch(e) { addToast({ message: 'Erreur: ' + e.message, type: 'error' }); }
  }

  const allIssues = Array.isArray(issues) ? issues.map(i => ({ ...i, issueType: i.type || 'unknown' })) : [];

  return (
    <div>
      <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:20}}>
        <h2 style={{margin:0, fontSize:18}}>{t.title}</h2>
        <button onClick={fetchIssues} disabled={loading} style={{padding:'7px 14px', fontSize:13, background:'rgba(255,255,255,0.07)', border:'1px solid var(--border)', borderRadius:8, color:'var(--text)', cursor:'pointer'}}>
          {loading ? t.loading : t.refresh}
        </button>
      </div>

      {/* Ignored list */}
      {ignored.length > 0 && (
        <div className="glass" style={{padding:16, marginBottom:16}}>
          <h3 style={{margin:'0 0 10px', fontSize:14, color:'var(--muted)'}}>Éléments ignorés ({ignored.length})</h3>
          <div style={{display:'flex', flexWrap:'wrap', gap:6}}>
            {ignored.map((item, i) => (
              <div key={i} style={{display:'flex', alignItems:'center', gap:6, background:'rgba(255,255,255,0.05)', padding:'4px 10px', borderRadius:6, fontSize:12}}>
                <span className="badge badge-gray" style={{fontSize:10}}>{item.type}</span>
                <span>{item.name}</span>
                <button onClick={() => unignoreItem(item.type, item.name)} aria-label="Réactiver cet élément" title="Réactiver" style={{background:'none', border:'none', color:'#f87171', cursor:'pointer', fontSize:14, lineHeight:1}}>×</button>
              </div>
            ))}
          </div>
        </div>
      )}

      {loading ? (
        <div style={{textAlign:'center', padding:40, color:'var(--muted)'}}>{t.loading}</div>
      ) : !allIssues.length ? (
        <div className="glass" style={{padding:40, textAlign:'center', color:'var(--muted)'}}>{t.noIssues}</div>
      ) : (
        <div style={{display:'flex', flexDirection:'column', gap:8}}>
          {allIssues.map((issue, i) => (
            <div key={i} className="glass" style={{padding:14, display:'flex', alignItems:'center', justifyContent:'space-between', gap:12}}>
              <div style={{display:'flex', alignItems:'center', gap:10}}>
                <span className={`badge ${issue.issueType==='duplicate'?'badge-red':issue.issueType==='orphan'?'badge-yellow':'badge-blue'}`} style={{fontSize:10}}>
                  {issue.issueType==='duplicate'?t.duplicates:issue.issueType==='orphan'?t.orphans:t.wrongGenre}
                </span>
                <span style={{fontSize:13}}>{issue.title || issue.path || issue.name || JSON.stringify(issue)}</span>
                {issue.path && <span style={{fontSize:11, color:'var(--muted)'}}>{issue.path}</span>}
              </div>
              <button onClick={() => ignoreItem(issue.issueType, issue.title||issue.name||issue.path)}
                style={{padding:'4px 10px', fontSize:12, background:'rgba(255,255,255,0.06)', border:'1px solid var(--border)', borderRadius:6, color:'var(--muted)', cursor:'pointer', whiteSpace:'nowrap'}}>
                {t.ignore}
              </button>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// ─── Logs Tab ─────────────────────────────────────────────────────────────────
function LogsTab({ lang, addToast }) {
  const t = T[lang].logs;
  const [logs, setLogs] = useState([]);
  const [loading, setLoading] = useState(false);
  const bottomRef = useRef(null);

  useEffect(() => { fetchLogs(); }, []);

  async function fetchLogs() {
    setLoading(true);
    try {
      const data = await api('/api/logs');
      setLogs(Array.isArray(data) ? data : (data.logs || []));
    } catch(e) {}
    setLoading(false);
  }

  async function clearLogs() {
    try {
      await fetch('/api/logs', { method: 'DELETE' });
      setLogs([]);
    } catch(e) {}
  }

  function getLogColor(level) {
    if (level === 'error') return '#f87171';
    if (level === 'warning') return '#facc15';
    if (level === 'success') return '#4ade80';
    return 'var(--text)';
  }

  return (
    <div>
      <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:16}}>
        <h2 style={{margin:0, fontSize:18}}>{t.title}</h2>
        <div style={{display:'flex', gap:8}}>
          <button onClick={fetchLogs} disabled={loading} style={{padding:'6px 12px', fontSize:12, background:'rgba(255,255,255,0.07)', border:'1px solid var(--border)', borderRadius:6, color:'var(--text)', cursor:'pointer'}}>{t.refresh}</button>
          <button onClick={clearLogs} style={{padding:'6px 12px', fontSize:12, background:'rgba(239,68,68,0.1)', border:'1px solid rgba(239,68,68,0.3)', borderRadius:6, color:'#f87171', cursor:'pointer'}}>{t.clear}</button>
        </div>
      </div>
      <div className="glass" style={{padding:16, maxHeight:600, overflowY:'auto', fontFamily:'monospace'}}>
        {!logs.length ? (
          <p style={{color:'var(--muted)', textAlign:'center', padding:20}}>{t.noLogs}</p>
        ) : (
          logs.map((log, i) => (
            <div key={i} className="log-line" style={{color: getLogColor(log.level), display: 'flex', gap: 8}}>
              <span style={{color: 'var(--muted)'}}>[{new Date(log.timestamp).toLocaleString()}]</span>
              <span style={{color: 'var(--muted)', width: 60}}>[{log.category}]</span>
              <span>{log.message}</span>
            </div>
          ))
        )}
        <div ref={bottomRef} />
      </div>
    </div>
  );
}

function SettingsTab({ lang, addToast }) {
  const t = T[lang].settings;
  const [activeSettingsTab, setActiveSettingsTab] = useState('connections');
  const [settings, setSettings] = useState({});
  const [genres, setGenres] = useState([]);
  const [studios, setStudios] = useState([]);
  const [platforms, setPlatforms] = useState([]);
  const [exclusions, setExclusions] = useState([]);
  const [saving, setSaving] = useState(false);
  const [saved, setSaved] = useState(false);
  const [cronStatus, setCronStatus] = useState(null);

  useEffect(() => {
    api('/api/settings').then(d => setSettings(d || {})).catch(() => {});
    api('/api/genres').then(d => setGenres(d || [])).catch(() => {});
    api('/api/studios').then(d => setStudios(d || [])).catch(() => {});
    api('/api/platforms').then(d => setPlatforms(d || [])).catch(() => {});
    api('/api/ignore').then(d => {
      if (d && !Array.isArray(d)) {
        const flat = [];
        Object.keys(d).forEach(key => {
          (d[key] || []).forEach(name => {
            flat.push({ type: key, name });
          });
        });
        setExclusions(flat);
      } else {
        setExclusions(d || []);
      }
    }).catch(() => {});
    api('/api/cron/status').then(d => setCronStatus(d)).catch(() => {});
  }, []);

  async function saveSettings() {
    setSaving(true);
    try {
      const payload = { ...settings };
      payload.genreMapping = {};
      genres.forEach(g => { payload.genreMapping[g.name] = { folder: g.folder, enabled: g.enabled }; });
      payload.studioMapping = {};
      studios.forEach(s => { payload.studioMapping[s.name] = { folder: s.folder, enabled: s.enabled }; });
      payload.platformMapping = {};
      platforms.forEach(p => { payload.platformMapping[p.name] = { folder: p.folder, enabled: p.enabled }; });

      await api('/api/settings', { method: 'POST', body: payload });
      setSaved(true);
      setTimeout(() => setSaved(false), 2000);
      addToast({ message: t.saved, type: 'success' });
    } catch(e) { addToast({ message: 'Erreur: ' + e.message, type: 'error' }); }
    setSaving(false);
  }

  async function handleRunAllHardlinks() {
    try {
      addToast({ message: 'Recréation de TOUS les hardlinks...', type: 'info' });
      await api('/api/run-all', { method: 'POST' });
      addToast({ message: 'Hardlinks relancés', type: 'success' });
    } catch(e) { addToast({ message: 'Erreur: ' + e.message, type: 'error' }); }
  }

  async function triggerCron() {
    try {
      await api('/api/cron/trigger', { method: 'POST' });
      addToast({ message: 'Cron lancé', type: 'success' });
    } catch(e) { addToast({ message: 'Erreur: ' + e.message, type: 'error' }); }
  }

  function Field({ label, field, type = 'text', placeholder = '' }) {
    return (
      <div style={{marginBottom:14}}>
        <label htmlFor={field} style={{display:'block', fontSize:12, color:'var(--muted)', marginBottom:4}}>{label}</label>
        <input id={field} type={type} value={settings[field] || ''} placeholder={placeholder}
          onChange={e => setSettings(p => ({ ...p, [field]: e.target.value }))}
          style={{width:'100%'}} />
      </div>
    );
  }

  function MappingEditor({ items, setItems, nameLabel, folderLabel, type }) {
    const [newName, setNewName] = useState('');
    const [newFolder, setNewFolder] = useState('');

    const classicStudios = ["20th Century Studios", "Universal Pictures", "Warner Bros. Pictures", "Paramount", "Columbia Pictures", "Walt Disney Pictures", "Marvel Studios", "DreamWorks Animation", "Pixar", "Fox", "Sony", "Lionsgate"];
    const classicPlatforms = ["Netflix", "Amazon Prime Video", "Disney+", "Apple TV+", "Apple TV Plus", "Hulu", "HBO Max", "Max", "Peacock", "Paramount+"];

    function addItem() {
      if (!newName.trim()) return;
      setItems(prev => [...prev, { name: newName.trim(), folder: newFolder.trim() || newName.trim(), enabled: true }]);
      setNewName(''); setNewFolder('');
    }

    function removeItem(idx) {
      setItems(prev => prev.filter((_, i) => i !== idx));
    }

    function updateItem(idx, key, val) {
      setItems(prev => prev.map((item, i) => i === idx ? { ...item, [key]: val } : item));
    }

    function toggleAll(enable) {
      setItems(prev => prev.map(item => ({ ...item, enabled: enable })));
    }

    function applyClassicsOnly() {
      const classicsList = type === 'studios' ? classicStudios : (type === 'platforms' ? classicPlatforms : []);
      const lowerClassics = classicsList.map(s => s.toLowerCase());

      setItems(prev => {
        if(classicsList.length === 0) return prev;
        return prev.filter(item => {
           const itemNameLower = (item.name || '').toLowerCase();
           return lowerClassics.some(c => itemNameLower.includes(c));
        });
      });
    }

    return (
      <div>
        <div style={{display:'flex', gap:8, marginBottom: 16}}>
          <button onClick={() => toggleAll(true)} style={{padding:'6px 12px', fontSize:12, background:'rgba(34,197,94,0.1)', border:'1px solid rgba(34,197,94,0.3)', borderRadius:6, color:'#4ade80', cursor:'pointer'}}>{t.enableAll || "Tout activer"}</button>
          <button onClick={() => toggleAll(false)} style={{padding:'6px 12px', fontSize:12, background:'rgba(239,68,68,0.1)', border:'1px solid rgba(239,68,68,0.3)', borderRadius:6, color:'#f87171', cursor:'pointer'}}>{t.disableAll || "Tout désactiver"}</button>
          {type !== 'genres' && (
            <button onClick={applyClassicsOnly} style={{padding:'6px 12px', fontSize:12, background:'rgba(99,102,241,0.1)', border:'1px solid rgba(99,102,241,0.3)', borderRadius:6, color:'#818cf8', cursor:'pointer'}}>{t.onlyClassics || "Classiques uniquement"}</button>
          )}
        </div>
        {items.map((item, idx) => (
          <div key={idx} style={{display:'flex', gap:8, marginBottom:6, alignItems:'center'}}>
            <input type="checkbox" checked={!!item.enabled} onChange={e => updateItem(idx, 'enabled', e.target.checked)} style={{width: 16, height: 16, cursor:'pointer'}} />
            <input value={item.name || ''} onChange={e => updateItem(idx, 'name', e.target.value)} placeholder={nameLabel} style={{flex:1}} />
            <input value={item.folder || ''} onChange={e => updateItem(idx, 'folder', e.target.value)} placeholder={folderLabel} style={{flex:1}} />
            <button onClick={() => removeItem(idx)} style={{padding:'6px 10px', background:'rgba(239,68,68,0.15)', border:'1px solid rgba(239,68,68,0.3)', color:'#f87171', borderRadius:6, cursor:'pointer', fontSize:12}}>{t.remove}</button>
          </div>
        ))}
        <div style={{display:'flex', gap:8, marginTop:8}}>
          <div style={{width: 16}}></div> {/* Spacer for checkbox */}
          <input value={newName} onChange={e => setNewName(e.target.value)} placeholder={nameLabel} style={{flex:1}} />
          <input value={newFolder} onChange={e => setNewFolder(e.target.value)} placeholder={folderLabel} style={{flex:1}} />
          <button onClick={addItem} className="grad-btn" style={{padding:'6px 14px', fontSize:13}}>{t.add}</button>
        </div>
      </div>
    );
  }

  const settingsTabs = [
    { key: 'connections', label: t.tabs.connections },
    { key: 'paths', label: t.tabs.paths },
    { key: 'series', label: t.tabs.series },
    { key: 'automation', label: t.tabs.automation },
    { key: 'genres', label: t.tabs.genres },
    { key: 'studios', label: t.tabs.studios },
    { key: 'platforms', label: t.tabs.platforms },
    { key: 'exclusions', label: t.tabs.exclusions },
  ];

  return (
    <div>
      <div style={{display:'flex', gap:6, marginBottom:20, flexWrap:'wrap'}}>
        {settingsTabs.map(tab => (
          <button key={tab.key} className={`tab-btn ${activeSettingsTab===tab.key?'active':''}`} onClick={() => setActiveSettingsTab(tab.key)} style={{fontSize:12}}>
            {tab.label}
          </button>
        ))}
      </div>

      <div className="glass" style={{padding:24}}>
        {activeSettingsTab === 'connections' && (
          <div>
            <Field label={t.radarrUrl} field="radarrUrl" placeholder="http://localhost:7878" />
            <Field label={t.radarrKey} field="radarrApiKey" />
            <Field label={t.tmdbKey} field="tmdbApiKey" />
            <Field label={t.tmdbCountry} field="tmdbCountry" placeholder="FR" />
            <Field label={t.jellyfinUrl} field="jellyfinUrl" placeholder="http://localhost:8096" />
            <Field label={t.jellyfinKey} field="jellyfinApiKey" />
            <Field label={t.jellystatUrl} field="jellystatUrl" placeholder="http://localhost:3004" />
            <Field label={t.jellystatKey} field="jellystatApiKey" />
          </div>
        )}

        {activeSettingsTab === 'paths' && (
          <div>
            <Field label={t.sourcePath} field="sourcePath" placeholder="/media/movies/A trier" />
            <Field label={t.genresPath} field="genresPath" placeholder="/media/movies/Genres" />
            <Field label={t.studiosPath} field="studiosPath" placeholder="/media/movies/Studios" />
            <Field label={t.platformsPath} field="platformsPath" placeholder="/media/movies/Plateformes" />
          </div>
        )}

        {activeSettingsTab === 'series' && (
          <div>
            <Field label={t.seriesPath} field="seriesPath" placeholder="/media/series" />
          </div>
        )}

        {activeSettingsTab === 'automation' && (
          <div>
            <div style={{marginBottom:14}}>
              <label style={{display:'flex', alignItems:'center', gap:8, fontSize:14, cursor:'pointer'}}>
                <input type="checkbox" checked={!!settings.cronEnabled} onChange={e => setSettings(p => ({ ...p, cronEnabled: e.target.checked }))} style={{width:16, height:16}} />
                {t.cronEnabled}
              </label>
            </div>
            <Field label={t.cronSchedule} field="cronSchedule" placeholder="0 3 * * *" />
            <div style={{display:'flex', gap:10, marginTop:10, alignItems:'center', marginBottom: 20}}>
              <button onClick={triggerCron} style={{padding:'7px 14px', fontSize:13, background:'rgba(255,255,255,0.07)', border:'1px solid var(--border)', borderRadius:8, color:'var(--text)', cursor:'pointer'}}>
                {t.cronTrigger}
              </button>
              {cronStatus && (
                <span style={{fontSize:12, color:'var(--muted)'}}>{t.cronStatus}: <span style={{color: cronStatus.running ? '#4ade80' : 'var(--muted)'}}>
                  {cronStatus.running ? 'En cours' : 'Arrêté'} {cronStatus.lastRun ? `• Dernier: ${new Date(cronStatus.lastRun).toLocaleString()}` : ''}
                </span></span>
              )}
            </div>
            <div style={{borderTop: '1px solid var(--border)', paddingTop: 20}}>
                <button onClick={handleRunAllHardlinks} style={{padding:'7px 14px', fontSize:13, background:'rgba(255,255,255,0.07)', border:'1px solid var(--border)', borderRadius:8, color:'var(--text)', cursor:'pointer'}}>
                  {t.runAllHardlinks || "Recréer TOUS les hardlinks"}
                </button>
                <p style={{fontSize:12, color:'var(--muted)', marginTop: 8}}>Lance la création de tous les hardlinks pour tous les films.</p>
            </div>
          </div>
        )}

        {activeSettingsTab === 'genres' && (
          <div>
            <p style={{fontSize:13, color:'var(--muted)', marginTop:0}}>Mappings genre → dossier</p>
            <MappingEditor items={genres} setItems={setGenres} nameLabel={t.genreName} folderLabel={t.genreFolder} type="genres" />
          </div>
        )}

        {activeSettingsTab === 'studios' && (
          <div>
            <p style={{fontSize:13, color:'var(--muted)', marginTop:0}}>Mappings studio → dossier</p>
            <MappingEditor items={studios} setItems={setStudios} nameLabel={t.studioName} folderLabel={t.studioFolder} type="studios" />
          </div>
        )}

        {activeSettingsTab === 'platforms' && (
          <div>
            <p style={{fontSize:13, color:'var(--muted)', marginTop:0}}>Mappings plateforme → dossier</p>
            <MappingEditor items={platforms} setItems={setPlatforms} nameLabel={t.platformName} folderLabel={t.platformFolder} type="platforms" />
          </div>
        )}

        {activeSettingsTab === 'exclusions' && (
          <div>
            <p style={{fontSize:13, color:'var(--muted)', marginTop:0}}>Films/genres/studios exclus du traitement</p>
            {exclusions.length === 0 ? (
              <p style={{color:'var(--muted)', fontSize:13}}>Aucune exclusion</p>
            ) : (
              <div style={{display:'flex', flexDirection:'column', gap:6}}>
                {exclusions.map((ex, i) => (
                  <div key={i} style={{display:'flex', alignItems:'center', gap:10, padding:'8px 12px', background:'rgba(255,255,255,0.03)', borderRadius:8}}>
                    <span className="badge badge-gray" style={{fontSize:11}}>{ex.type}</span>
                    <span style={{fontSize:13, flex:1}}>{ex.name}</span>
                    <button onClick={async () => {
                      try {
                        await fetch(`/api/ignore/${ex.type}/${encodeURIComponent(ex.name)}`, { method: 'DELETE' });
                        setExclusions(prev => prev.filter((_, j) => j !== i));
                      } catch(e) {}
                    }} style={{padding:'3px 8px', fontSize:12, background:'rgba(239,68,68,0.15)', border:'1px solid rgba(239,68,68,0.3)', color:'#f87171', borderRadius:6, cursor:'pointer'}}>
                      {t.remove}
                    </button>
                  </div>
                ))}
              </div>
            )}
          </div>
        )}

        <div style={{marginTop:20, paddingTop:16, borderTop:'1px solid var(--border)', display:'flex', gap:10}}>
          <button className="grad-btn" style={{padding:'9px 22px', fontSize:14}} onClick={saveSettings} disabled={saving}>
            {saving ? t.saving : saved ? t.saved : t.save}
          </button>
        </div>
      </div>
    </div>
  );
}

// ─── App Root ─────────────────────────────────────────────────────────────────
function App() {
  const [lang, setLang] = useState('fr');
  const [activeTab, setActiveTab] = useState('library');
  const [movies, setMovies] = useState([]);
  const [genres, setGenres] = useState([]);
  const [studios, setStudios] = useState([]);
  const [platforms, setPlatforms] = useState([]);
  const [loadingMovies, setLoadingMovies] = useState(false);
  const [toasts, setToasts] = useState([]);
  const toastId = useRef(0);

  const t = T[lang];

  function addToast(toast) {
    const id = ++toastId.current;
    setToasts(prev => [...prev, { ...toast, id }]);
    setTimeout(() => setToasts(prev => prev.filter(t => t.id !== id)), 3500);
  }

  async function fetchMovies(force = false) {
    setLoadingMovies(true);
    try {
      const data = await api(`/api/status${force ? '?force=true' : ''}`);
      setMovies(Array.isArray(data) ? data : (data.movies || []));
    } catch(e) { addToast({ message: 'Erreur chargement films: ' + e.message, type: 'error' }); }
    setLoadingMovies(false);
  }

  async function fetchMeta() {
    try {
      const [g, s, p] = await Promise.all([api('/api/genres'), api('/api/studios'), api('/api/platforms')]);
      setGenres(Array.isArray(g) ? g : []);
      setStudios(Array.isArray(s) ? s : []);
      setPlatforms(Array.isArray(p) ? p : []);
    } catch(e) {}
  }

  useEffect(() => {
    fetchMovies();
    fetchMeta();
  }, []);

  const tabs = [
    { key: 'library', label: t.tabs.library },
    { key: 'issues', label: t.tabs.issues },
    { key: 'series', label: t.tabs.series },
    { key: 'stats', label: t.tabs.stats },
    { key: 'logs', label: t.tabs.logs },
    { key: 'settings', label: t.tabs.settings },
  ];

  return (
    <div style={{minHeight:'100vh', padding:'0 0 40px'}}>
      {/* Header */}
      <div style={{borderBottom:'1px solid var(--border)', padding:'14px 24px', display:'flex', alignItems:'center', justifyContent:'space-between', background:'rgba(10,15,30,0.8)', backdropFilter:'blur(12px)', position:'sticky', top:0, zIndex:50}}>
        <h1 className="grad-text" style={{margin:0, fontSize:20, fontWeight:700, letterSpacing:'-0.02em'}}>{t.appTitle}</h1>
        <div style={{display:'flex', alignItems:'center', gap:16}}>
          {loadingMovies && <span style={{fontSize:12, color:'var(--muted)', display:'flex', alignItems:'center', gap:6}}><span className="animate-spin" style={{display:'inline-block', width:12, height:12, border:'2px solid var(--accent)', borderTopColor:'transparent', borderRadius:'50%'}}></span> {t.common.loading}</span>}
          <button onClick={() => setLang(l => l === 'fr' ? 'en' : 'fr')}
            style={{padding:'5px 12px', fontSize:12, background:'rgba(255,255,255,0.07)', border:'1px solid var(--border)', borderRadius:6, color:'var(--text)', cursor:'pointer'}}>
            {lang === 'fr' ? '🇬🇧 EN' : '🇫🇷 FR'}
          </button>
        </div>
      </div>

      <div style={{padding:'20px 24px'}}>
        {/* Status Bar */}
        <StatusBar movies={movies} genres={genres} studios={studios} platforms={platforms} lang={lang} />

        {/* Tabs */}
        <div style={{display:'flex', gap:4, marginBottom:20, flexWrap:'wrap', borderBottom:'1px solid var(--border)', paddingBottom:10}}>
          {tabs.map(tab => (
            <button key={tab.key} className={`tab-btn ${activeTab===tab.key?'active':''}`} onClick={() => setActiveTab(tab.key)}>
              {tab.label}
            </button>
          ))}
        </div>

        {/* Tab Content */}
        {activeTab === 'library' && (
          <LibraryTab movies={movies} genres={genres} studios={studios} platforms={platforms} loading={loadingMovies} onRefresh={fetchMovies} lang={lang} addToast={addToast} />
        )}
        {activeTab === 'issues' && <IssuesTab lang={lang} addToast={addToast} />}
        {activeTab === 'series' && <SeriesTab lang={lang} addToast={addToast} />}
        {activeTab === 'stats' && <StatsTab lang={lang} addToast={addToast} />}
        {activeTab === 'logs' && <LogsTab lang={lang} addToast={addToast} />}
        {activeTab === 'settings' && <SettingsTab lang={lang} addToast={addToast} />}
      </div>

      <Toast toasts={toasts} />
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
