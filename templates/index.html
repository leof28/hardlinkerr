<!DOCTYPE html>
<html lang="fr" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hardlink Manager</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
        * { font-family: 'Inter', sans-serif; }
        body { background: #0a0f1e; min-height: 100vh; }
        .glass { background: rgba(15,23,42,0.7); backdrop-filter: blur(16px); border: 1px solid rgba(255,255,255,0.07); }
        .glass-hover { background: rgba(15,23,42,0.7); backdrop-filter: blur(16px); border: 1px solid rgba(255,255,255,0.07); transition: all 0.2s; }
        .glass-hover:hover { border-color: rgba(255,255,255,0.15); background: rgba(15,23,42,0.85); }
        .gradient-text { background: linear-gradient(135deg, #60a5fa 0%, #a78bfa 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        .btn-primary { background: linear-gradient(135deg, #3b82f6, #7c3aed); border-radius: 10px; font-weight: 600; transition: all 0.2s; padding: 9px 18px; font-size: 13px; }
        .btn-primary:hover { opacity: 0.88; transform: translateY(-1px); box-shadow: 0 4px 20px rgba(59,130,246,0.3); }
        .btn-primary:disabled { opacity: 0.4; transform: none; cursor: not-allowed; }
        .btn-danger { background: linear-gradient(135deg, #ef4444, #b91c1c); border-radius: 10px; font-weight: 600; transition: all 0.2s; padding: 9px 18px; font-size: 13px; }
        .btn-danger:hover { opacity: 0.88; }
        .btn-ghost { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; transition: all 0.2s; padding: 9px 18px; font-size: 13px; font-weight: 500; }
        .btn-ghost:hover { background: rgba(255,255,255,0.1); }
        .input-field { width: 100%; padding: 10px 14px; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; color: white; outline: none; transition: border-color 0.2s; font-size: 13px; }
        .input-field:focus { border-color: #3b82f6; background: rgba(255,255,255,0.07); }
        .input-field::placeholder { color: rgba(255,255,255,0.25); }
        .input-field:disabled { opacity: 0.4; cursor: not-allowed; }
        .nav-tab { padding: 10px 4px; font-size: 13px; font-weight: 500; color: #64748b; border-bottom: 2px solid transparent; transition: all 0.2s; cursor: pointer; white-space: nowrap; }
        .nav-tab:hover { color: #94a3b8; }
        .nav-tab.active { color: white; border-color: #3b82f6; }
        .poster-card { transition: transform 0.25s, box-shadow 0.25s; }
        .poster-card:hover { transform: translateY(-6px); box-shadow: 0 16px 40px rgba(59,130,246,0.25); }
        .badge { display: inline-flex; align-items: center; padding: 2px 8px; border-radius: 6px; font-size: 11px; font-weight: 600; letter-spacing: 0.01em; }
        .toggle-switch { position: relative; width: 40px; height: 22px; flex-shrink: 0; }
        .toggle-switch input { opacity: 0; width: 0; height: 0; }
        .toggle-slider { position: absolute; inset: 0; background: rgba(100,116,139,0.35); border-radius: 22px; cursor: pointer; transition: 0.25s; }
        .toggle-slider::before { content: ''; position: absolute; width: 16px; height: 16px; left: 3px; bottom: 3px; background: white; border-radius: 50%; transition: 0.25s; }
        input:checked + .toggle-slider { background: linear-gradient(135deg, #3b82f6, #7c3aed); }
        input:checked + .toggle-slider::before { transform: translateX(18px); }
        .log-row:nth-child(even) { background: rgba(255,255,255,0.015); }
        .scrollbar-thin::-webkit-scrollbar { width: 5px; height: 5px; }
        .scrollbar-thin::-webkit-scrollbar-track { background: transparent; }
        .scrollbar-thin::-webkit-scrollbar-thumb { background: rgba(100,116,139,0.3); border-radius: 3px; }
        .scrollbar-thin::-webkit-scrollbar-thumb:hover { background: rgba(100,116,139,0.5); }
        @keyframes spin { to { transform: rotate(360deg); } }
        .spin { animation: spin 1s linear infinite; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }
        .fade-in { animation: fadeIn 0.2s ease; }
        .poster-card .movie-delete-btn { opacity: 0; transition: opacity 0.2s; }
        .poster-card:hover .movie-delete-btn { opacity: 1; }
    </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback, useRef } = React;

// ─── API helper ───────────────────────────────────────────────────────────────
const apiFetch = async (url, opts = {}) => {
  const res = await fetch(url, {
    method: opts.method || 'GET',
    headers: opts.body ? { 'Content-Type': 'application/json' } : {},
    body: opts.body ? JSON.stringify(opts.body) : undefined
  });
  return res.json();
};

// ─── Toast notifications ──────────────────────────────────────────────────────
const toastColors = {
  success: '#10b981',
  error:   '#ef4444',
  warning: '#f59e0b',
  info:    '#3b82f6'
};
const toastIcons = { success: '✓', error: '✕', warning: '⚠', info: 'ℹ' };

const showToast = (message, type = 'info') => {
  const el = document.createElement('div');
  el.style.cssText = `
    position:fixed;top:20px;right:20px;z-index:9999;
    display:flex;align-items:center;gap:10px;
    padding:12px 18px;border-radius:12px;
    background:rgba(10,15,30,0.95);border:1px solid ${toastColors[type]}40;
    box-shadow:0 8px 32px rgba(0,0,0,0.5);
    font-size:13px;font-weight:500;color:white;
    animation:fadeIn 0.2s ease;max-width:360px;
  `;
  el.innerHTML = `<span style="color:${toastColors[type]};font-size:16px">${toastIcons[type]}</span><span>${message}</span>`;
  document.body.appendChild(el);
  setTimeout(() => { el.style.opacity = '0'; el.style.transition = 'opacity 0.3s'; setTimeout(() => el.remove(), 300); }, 3500);
};

// ─── Utilities ────────────────────────────────────────────────────────────────
const formatSize = (b) => {
  if (!b) return '0 B';
  if (b < 1024) return b + ' B';
  if (b < 1048576) return (b/1024).toFixed(1) + ' KB';
  if (b < 1073741824) return (b/1048576).toFixed(1) + ' MB';
  return (b/1073741824).toFixed(2) + ' GB';
};
const formatDate = (iso) => {
  if (!iso) return 'Jamais';
  try { return new Date(iso).toLocaleString('fr-FR', { dateStyle: 'short', timeStyle: 'short' }); }
  catch { return iso; }
};
const formatDateFull = (iso) => {
  if (!iso) return '—';
  try { return new Date(iso).toLocaleString('fr-FR', { day:'2-digit', month:'2-digit', year:'numeric', hour:'2-digit', minute:'2-digit', second:'2-digit' }); }
  catch { return iso; }
};

// ─── Sub-components ───────────────────────────────────────────────────────────
const Spinner = ({ size = 18 }) => (
  <svg className="spin" style={{ width: size, height: size }} viewBox="0 0 24 24" fill="none">
    <circle cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="3" strokeDasharray="40" strokeDashoffset="10" strokeLinecap="round"/>
  </svg>
);

const StatCard = ({ icon, label, value, sub, color, onClick }) => {
  const colors = {
    blue:   { bg: 'rgba(59,130,246,0.12)',  text: '#60a5fa' },
    green:  { bg: 'rgba(16,185,129,0.12)', text: '#34d399' },
    red:    { bg: 'rgba(239,68,68,0.12)',   text: '#f87171' },
    purple: { bg: 'rgba(139,92,246,0.12)', text: '#a78bfa' },
    amber:  { bg: 'rgba(245,158,11,0.12)', text: '#fbbf24' },
  };
  const c = colors[color] || colors.blue;
  return (
    <div onClick={onClick}
      className={`glass rounded-2xl p-5 ${onClick ? 'cursor-pointer hover:border-white/20 transition-all' : ''}`}
      style={{ borderColor: onClick ? undefined : 'rgba(255,255,255,0.07)' }}>
      <div className="flex items-start justify-between gap-3">
        <div className="flex-1 min-w-0">
          <p className="text-xs font-medium uppercase tracking-wider mb-2" style={{ color: 'rgba(148,163,184,0.7)' }}>{label}</p>
          <p className="text-3xl font-bold" style={{ color: c.text }}>{value}</p>
          {sub && <p className="text-xs mt-1" style={{ color: 'rgba(148,163,184,0.5)' }}>{sub}</p>}
        </div>
        <div className="w-10 h-10 rounded-xl flex items-center justify-center text-lg flex-shrink-0" style={{ background: c.bg }}>
          {icon}
        </div>
      </div>
    </div>
  );
};

const ToggleSwitch = ({ checked, onChange }) => (
  <label className="toggle-switch">
    <input type="checkbox" checked={checked} onChange={e => onChange(e.target.checked)} />
    <span className="toggle-slider" />
  </label>
);

const SectionCard = ({ title, icon, children, action, toggle, onToggle }) => (
  <div className="glass rounded-xl p-5">
    <div className="flex items-center gap-2 mb-4 pb-3" style={{ borderBottom: '1px solid rgba(255,255,255,0.07)' }}>
      {icon && <span className="text-base">{icon}</span>}
      <h3 className="text-sm font-semibold flex-1 text-white/90">{title}</h3>
      {action}
      {onToggle !== undefined && <ToggleSwitch checked={toggle} onChange={onToggle} />}
    </div>
    <div className="space-y-4">{children}</div>
  </div>
);

const Field = ({ label, hint, children }) => (
  <div>
    <label className="text-xs font-medium block mb-1.5" style={{ color: 'rgba(148,163,184,0.8)' }}>{label}</label>
    {hint && <p className="text-xs mb-2" style={{ color: 'rgba(100,116,139,0.8)' }}>{hint}</p>}
    {children}
  </div>
);

// ─── Level badge for logs ──────────────────────────────────────────────────────
const LevelBadge = ({ level }) => {
  const styles = {
    success: { bg: 'rgba(16,185,129,0.15)', color: '#34d399', label: 'Succès' },
    error:   { bg: 'rgba(239,68,68,0.15)',  color: '#f87171', label: 'Erreur' },
    warning: { bg: 'rgba(245,158,11,0.15)', color: '#fbbf24', label: 'Avert.' },
    info:    { bg: 'rgba(59,130,246,0.15)', color: '#60a5fa', label: 'Info'   },
  };
  const s = styles[level] || styles.info;
  return <span className="badge" style={{ background: s.bg, color: s.color }}>{s.label}</span>;
};

const CategoryBadge = ({ category }) => {
  const styles = {
    hardlink: { bg: 'rgba(139,92,246,0.15)', color: '#a78bfa' },
    series:   { bg: 'rgba(245,158,11,0.15)', color: '#fbbf24' },
    cron:     { bg: 'rgba(16,185,129,0.15)', color: '#34d399' },
    delete:   { bg: 'rgba(239,68,68,0.15)',  color: '#f87171' },
    webhook:  { bg: 'rgba(59,130,246,0.15)', color: '#60a5fa' },
    scan:     { bg: 'rgba(99,102,241,0.15)', color: '#818cf8' },
    ignore:   { bg: 'rgba(100,116,139,0.2)', color: '#94a3b8' },
  };
  const s = styles[category] || { bg: 'rgba(100,116,139,0.15)', color: '#94a3b8' };
  const labels = { hardlink: 'Hardlink', series: 'Séries', cron: 'Cron', delete: 'Suppression', webhook: 'Webhook', scan: 'Scan', ignore: 'Ignoré' };
  return <span className="badge" style={{ background: s.bg, color: s.color }}>{labels[category] || category}</span>;
};

// ─── Main App ─────────────────────────────────────────────────────────────────
const App = () => {
  const [activeView, setActiveView] = useState('library');
  const [config, setConfig] = useState(null);
  const [movies, setMovies] = useState([]);
  const [duplicates, setDuplicates] = useState([]);
  const [seriesIssues, setSeriesIssues] = useState([]);
  const [allGenres, setAllGenres] = useState([]);
  const [logs, setLogs] = useState([]);
  const [ignored, setIgnored] = useState({ series: [], movies: [] });
  const [loading, setLoading] = useState(false);
  const [search, setSearch] = useState('');
  const [genreFilter, setGenreFilter] = useState('');
  const [showOnlyMissing, setShowOnlyMissing] = useState(false);
  const [selectedMovies, setSelectedMovies] = useState(new Set());
  const [stats, setStats] = useState({ total: 0, linked: 0, errors: 0, activeGenres: 0 });
  const [showSettings, setShowSettings] = useState(false);
  const [settingsTab, setSettingsTab] = useState('general');
  const [cronStatus, setCronStatus] = useState(null);
  const [logLevel, setLogLevel] = useState('');
  const [logCategory, setLogCategory] = useState('');
  const [logAutoRefresh, setLogAutoRefresh] = useState(false);
  const logRefreshRef = useRef(null);

  useEffect(() => { fetchConfig(); fetchCronStatus(); fetchIgnored(); }, []);

  // Auto-refresh logs
  useEffect(() => {
    if (logAutoRefresh && activeView === 'logs') {
      logRefreshRef.current = setInterval(fetchLogs, 5000);
    } else {
      clearInterval(logRefreshRef.current);
    }
    return () => clearInterval(logRefreshRef.current);
  }, [logAutoRefresh, activeView]);

  useEffect(() => {
    if (activeView === 'logs') fetchLogs();
  }, [activeView]);

  const fetchConfig = async () => {
    try {
      const data = await apiFetch('/api/settings');
      setConfig(data);
      setStats(prev => ({
        ...prev,
        activeGenres: Object.values(data.genreMapping || {}).filter(g => g.enabled).length
      }));
    } catch { showToast('Erreur chargement config', 'error'); }
  };

  const fetchCronStatus = async () => {
    try { setCronStatus(await apiFetch('/api/cron/status')); } catch {}
  };

  const fetchAllGenres = async () => {
    try {
      const data = await apiFetch('/api/genres');
      if (Array.isArray(data)) setAllGenres(data);
    } catch { showToast('Erreur genres', 'error'); }
  };

  const fetchIgnored = async () => {
    try { setIgnored(await apiFetch('/api/ignore')); } catch {}
  };

  const fetchLogs = async () => {
    try {
      const params = new URLSearchParams({ limit: 300 });
      if (logLevel) params.set('level', logLevel);
      if (logCategory) params.set('category', logCategory);
      setLogs(await apiFetch('/api/logs?' + params));
    } catch { showToast('Erreur chargement logs', 'error'); }
  };

  const clearLogs = async () => {
    if (!confirm('Effacer tous les logs ?')) return;
    await apiFetch('/api/logs', { method: 'DELETE' });
    setLogs([]);
    showToast('Logs effacés', 'success');
  };

  const fetchSeriesIssues = async () => {
    setLoading(true);
    try {
      const data = await apiFetch('/api/series-issues');
      if (Array.isArray(data)) {
        setSeriesIssues(data);
        showToast(`${data.length} série(s) orpheline(s)`, data.length ? 'warning' : 'success');
      }
    } catch { showToast('Erreur scan séries', 'error'); }
    finally { setLoading(false); }
  };

  const ignoreSeries = async (seriesName) => {
    try {
      const res = await apiFetch('/api/ignore', { method: 'POST', body: { type: 'series', name: seriesName, label: seriesName } });
      setIgnored(res.ignored || await apiFetch('/api/ignore'));
      setSeriesIssues(prev => prev.filter(s => s.series !== seriesName));
      showToast(`"${seriesName}" ignorée`, 'info');
    } catch { showToast('Erreur', 'error'); }
  };

  const ignoreMovie = async (movieFolder, movieTitle) => {
    try {
      const res = await apiFetch('/api/ignore', { method: 'POST', body: { type: 'movies', name: movieFolder, label: movieTitle } });
      setIgnored(res.ignored || await apiFetch('/api/ignore'));
      setDuplicates(prev => prev.filter(d => d.movie !== movieFolder));
      showToast(`"${movieTitle}" ignoré`, 'info');
    } catch { showToast('Erreur', 'error'); }
  };

  const removeIgnored = async (type, name) => {
    try {
      await apiFetch(`/api/ignore/${type}/${encodeURIComponent(name)}`, { method: 'DELETE' });
      await fetchIgnored();
      showToast('Retiré de la liste d\'exclusion', 'success');
    } catch { showToast('Erreur', 'error'); }
  };

  const deleteSeries = async (path, name) => {
    if (!confirm(`Supprimer définitivement "${name}" ?\nIrréversible.`)) return;
    try {
      await apiFetch('/api/delete-series', { method: 'POST', body: { path, name } });
      setSeriesIssues(prev => prev.filter(s => s.path !== path));
      showToast('Série supprimée', 'success');
    } catch { showToast('Erreur suppression', 'error'); }
  };

  const deleteAllSeries = async () => {
    if (!seriesIssues.length) return;
    if (!confirm(`Supprimer ${seriesIssues.length} série(s) orpheline(s) ?\nIrréversible.`)) return;
    setLoading(true);
    try {
      const data = await apiFetch('/api/delete-all-series', { method: 'POST' });
      showToast(`${data.deleted} série(s) supprimée(s)`, 'success');
      fetchSeriesIssues();
    } catch { showToast('Erreur', 'error'); }
    finally { setLoading(false); }
  };

  const fetchDuplicates = async () => {
    setLoading(true);
    try {
      const data = await apiFetch('/api/duplicates');
      if (Array.isArray(data)) {
        setDuplicates(data);
        showToast(`${data.length} problème(s) détecté(s)`, data.length ? 'warning' : 'success');
      }
    } catch { showToast('Erreur scan', 'error'); }
    finally { setLoading(false); }
  };

  const scanMovies = async () => {
    setLoading(true);
    try {
      const data = await apiFetch('/api/status');
      if (data.error) { showToast('Erreur: ' + data.error, 'error'); return; }
      if (!Array.isArray(data)) { showToast('Format incorrect', 'error'); return; }
      setMovies(data);
      let linked = 0, errors = 0;
      data.forEach(m => (m.hardlinks || []).forEach(h => h.exists ? linked++ : errors++));
      setStats(prev => ({ ...prev, total: data.length, linked, errors }));
      showToast(`${data.length} films scannés`, 'success');
    } catch (e) { showToast('Erreur: ' + e.message, 'error'); }
    finally { setLoading(false); }
  };

  const createSelectedLinks = async () => {
    if (!selectedMovies.size) { showToast('Sélectionnez des films', 'warning'); return; }
    setLoading(true);
    try {
      await apiFetch('/api/run', { method: 'POST', body: { movie_paths: Array.from(selectedMovies) } });
      setSelectedMovies(new Set());
      showToast(`${selectedMovies.size} films traités`, 'success');
    } catch { showToast('Erreur', 'error'); }
    finally { setLoading(false); }
  };

  const createAllLinks = async () => {
    if (!confirm('Créer tous les hardlinks manquants ?')) return;
    setLoading(true);
    try {
      await apiFetch('/api/run-all', { method: 'POST' });
      showToast('Hardlinks créés', 'success');
    } catch { showToast('Erreur', 'error'); }
    finally { setLoading(false); }
  };

  const deleteMovieWithHardlinks = async (movie) => {
    const watchInfo = movie.watchCount > 0
      ? `\n\n⚠ Ce film a été vu ${movie.watchCount} fois sur Jellyfin.`
      : '';
    if (!confirm(`Supprimer "${movie.title}" ?\n\nSource + tous les hardlinks genre seront supprimés. Irréversible.${watchInfo}`)) return;
    try {
      const data = await apiFetch('/api/delete-movie', {
        method: 'POST',
        body: { sourcePath: movie.path, folderName: movie.folderName, title: movie.title }
      });
      if (data.error) { showToast('Erreur: ' + data.error, 'error'); return; }
      setMovies(prev => prev.filter(m => m.path !== movie.path));
      const count = (data.deleted || []).length;
      showToast(`"${movie.title}" supprimé (${count} dossier${count > 1 ? 's' : ''})`, 'success');
    } catch { showToast('Erreur suppression', 'error'); }
  };

  const deleteDuplicate = async (path) => {
    if (!confirm('Supprimer ce fichier ?')) return;
    try {
      await apiFetch('/api/delete-file', { method: 'POST', body: { path } });
      setDuplicates(prev => prev.filter(d => d.path !== path));
      showToast('Fichier supprimé', 'success');
    } catch { showToast('Erreur', 'error'); }
  };

  const deleteAllByType = async (type) => {
    const filtered = duplicates.filter(d => d.type === type);
    if (!filtered.length) return;
    if (!confirm(`Supprimer ${filtered.length} fichier(s) ?`)) return;
    setLoading(true);
    try {
      const data = await apiFetch('/api/delete-duplicates', { method: 'POST', body: { paths: filtered.map(d => d.path) } });
      showToast(`${data.deleted} fichier(s) supprimé(s)`, 'success');
      fetchDuplicates();
    } catch { showToast('Erreur', 'error'); }
    finally { setLoading(false); }
  };

  const saveConfig = async () => {
    try {
      await apiFetch('/api/settings', { method: 'POST', body: config });
      setStats(prev => ({
        ...prev,
        activeGenres: Object.values(config.genreMapping || {}).filter(g => g.enabled).length
      }));
      await fetchCronStatus();
      showToast('Configuration sauvegardée', 'success');
    } catch { showToast('Erreur sauvegarde', 'error'); }
  };

  const updateGenreMapping = (genre, field, value) => {
    setConfig(prev => {
      const newMapping = { ...prev.genreMapping };
      if (!newMapping[genre]) newMapping[genre] = { enabled: false, folder: genre };
      newMapping[genre][field] = value;
      return { ...prev, genreMapping: newMapping };
    });
  };

  const toggleMovieSelection = (path) => {
    setSelectedMovies(prev => {
      const s = new Set(prev);
      s.has(path) ? s.delete(path) : s.add(path);
      return s;
    });
  };

  const filteredMovies = movies.filter(m => {
    const s = m.title.toLowerCase().includes(search.toLowerCase());
    const g = !genreFilter || (m.hardlinks || []).some(h => h.folder === genreFilter);
    const miss = !showOnlyMissing || (m.hardlinks || []).some(h => !h.exists);
    return s && g && miss;
  });

  const filteredLogs = logs.filter(l => {
    const lv = !logLevel || l.level === logLevel;
    const ct = !logCategory || l.category === logCategory;
    return lv && ct;
  });

  const uniqueFolders = [...new Set(movies.flatMap(m => (m.hardlinks || []).map(h => h.folder)))].sort();
  const seriesEnabled = config?.seriesCheck?.enabled;
  const totalIgnored = (ignored.series || []).length + (ignored.movies || []).length;

  if (!config) {
    return (
      <div className="min-h-screen flex items-center justify-center">
        <div className="text-center">
          <Spinner size={40} />
          <p className="text-white/60 text-sm mt-4">Chargement...</p>
        </div>
      </div>
    );
  }

  const navTabs = [
    { id: 'library', label: 'Bibliothèque' },
    { id: 'issues', label: 'Films', badge: duplicates.length || null, badgeColor: '#ef4444' },
    ...(seriesEnabled ? [{ id: 'series', label: 'Séries', badge: seriesIssues.length || null, badgeColor: '#f59e0b' }] : []),
    { id: 'logs', label: 'Journaux', badge: null },
  ];

  return (
    <div className="min-h-screen text-white" style={{ padding: '24px', maxWidth: 1700, margin: '0 auto' }}>

      {/* ── HEADER ── */}
      <header className="mb-7">
        <div className="flex items-center justify-between gap-4">
          <div className="flex items-center gap-4">
            <div className="w-12 h-12 rounded-2xl flex items-center justify-center flex-shrink-0"
              style={{ background: 'linear-gradient(135deg,#3b82f6,#7c3aed)', boxShadow: '0 4px 20px rgba(59,130,246,0.3)' }}>
              <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round">
                <path d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101"/>
                <path d="M10.172 13.828a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1"/>
              </svg>
            </div>
            <div>
              <h1 className="text-2xl font-bold gradient-text">Hardlink Manager</h1>
              <p className="text-xs" style={{ color: 'rgba(100,116,139,0.9)' }}>Radarr · Sonarr · Bibliothèque média</p>
            </div>
          </div>
          <div className="flex items-center gap-2">
            <button onClick={scanMovies} disabled={loading} className="btn-primary flex items-center gap-2 text-white">
              {loading ? <Spinner size={14}/> : <span>⟳</span>} Scanner
            </button>
            <button onClick={() => { setShowSettings(true); setSettingsTab('general'); }} className="btn-ghost text-white/80">
              ⚙ Paramètres
            </button>
          </div>
        </div>

        {/* NAV */}
        <nav className="flex gap-6 mt-6" style={{ borderBottom: '1px solid rgba(255,255,255,0.07)' }}>
          {navTabs.map(tab => (
            <button key={tab.id} onClick={() => setActiveView(tab.id)}
              className={`nav-tab flex items-center gap-2 ${activeView === tab.id ? 'active' : ''}`}>
              {tab.label}
              {tab.badge > 0 && (
                <span style={{ background: tab.badgeColor, fontSize: 10, padding: '1px 7px', borderRadius: 20, fontWeight: 700 }}>
                  {tab.badge}
                </span>
              )}
            </button>
          ))}
        </nav>
      </header>

      {/* ── STATS ── */}
      <div className={`grid gap-4 mb-7 ${seriesEnabled ? 'grid-cols-5' : 'grid-cols-4'}`}>
        <StatCard icon="🎬" label="Films" value={stats.total} color="blue" />
        <StatCard icon="✓" label="Liens OK" value={stats.linked} color="green" />
        <StatCard icon="⚠" label="Manquants" value={stats.errors} color="red" />
        <StatCard icon="🎭" label="Genres actifs" value={stats.activeGenres} color="purple" />
        {seriesEnabled && (
          <StatCard icon="📺" label="Séries orphelines" value={seriesIssues.length}
            color="amber" onClick={() => setActiveView('series')} />
        )}
      </div>

      {/* ═══════════════════════════════════════════════════════════════ */}
      {/* LIBRARY VIEW */}
      {/* ═══════════════════════════════════════════════════════════════ */}
      {activeView === 'library' && (
        <div className="glass rounded-2xl p-6">
          <div className="flex flex-wrap items-center justify-between gap-3 mb-6">
            <div className="flex gap-2 flex-wrap">
              <input type="text" value={search} onChange={e => setSearch(e.target.value)}
                placeholder="Rechercher un film..." className="input-field" style={{ width: 240 }} />
              <select value={genreFilter} onChange={e => setGenreFilter(e.target.value)}
                className="input-field" style={{ width: 170 }}>
                <option value="">Tous les genres</option>
                {uniqueFolders.map(g => <option key={g} value={g}>{g}</option>)}
              </select>
              <button onClick={() => setShowOnlyMissing(!showOnlyMissing)}
                className={showOnlyMissing ? 'btn-danger text-white' : 'btn-ghost text-white/70'}>
                {showOnlyMissing ? '⚠ Sans liens' : 'Tous'}
              </button>
            </div>
            {filteredMovies.length > 0 && (
              <div className="flex gap-2">
                <button onClick={() => setSelectedMovies(selectedMovies.size === filteredMovies.length ? new Set() : new Set(filteredMovies.map(m => m.path)))}
                  className="btn-ghost text-white/70">
                  {selectedMovies.size === filteredMovies.length ? 'Désélectionner' : 'Tout sélect.'}
                </button>
                {selectedMovies.size > 0 && (
                  <button onClick={createSelectedLinks} disabled={loading} className="btn-primary text-white">
                    🔗 Créer ({selectedMovies.size})
                  </button>
                )}
                <button onClick={createAllLinks} disabled={loading}
                  className="text-white font-semibold text-sm px-4 py-2 rounded-xl transition-all"
                  style={{ background: 'rgba(16,185,129,0.2)', border: '1px solid rgba(16,185,129,0.3)' }}>
                  ⚡ Tout créer
                </button>
              </div>
            )}
          </div>

          {movies.length === 0 ? (
            <div className="text-center py-24" style={{ color: 'rgba(100,116,139,0.7)' }}>
              <div className="text-5xl mb-4">🎬</div>
              <p className="text-base font-medium">Bibliothèque vide</p>
              <p className="text-sm mt-1">Cliquez sur "Scanner" pour charger les films</p>
            </div>
          ) : (
            <>
              <p className="text-xs mb-4" style={{ color: 'rgba(100,116,139,0.7)' }}>
                {filteredMovies.length} film{filteredMovies.length !== 1 ? 's' : ''}
                {search || genreFilter || showOnlyMissing ? ' (filtrés)' : ''}
              </p>
              <div className="grid grid-cols-6 gap-3">
                {filteredMovies.map((movie, idx) => {
                  const hasErrors = (movie.hardlinks || []).some(h => !h.exists);
                  const allOk = (movie.hardlinks || []).length > 0 && (movie.hardlinks || []).every(h => h.exists);
                  const isSelected = selectedMovies.has(movie.path);
                  const addedRadarr = movie.addedToRadarr
                    ? new Date(movie.addedToRadarr).toLocaleDateString('fr-FR', { day:'2-digit', month:'2-digit', year:'2-digit' })
                    : null;
                  return (
                    <div key={idx} onClick={() => toggleMovieSelection(movie.path)}
                      className={`poster-card rounded-xl cursor-pointer overflow-hidden`}
                      style={{ border: isSelected ? '2px solid #3b82f6' : '1px solid rgba(255,255,255,0.07)', background: 'rgba(15,23,42,0.6)' }}>
                      <div style={{ aspectRatio: '2/3', position: 'relative' }}>
                        {movie.poster
                          ? <img src={movie.poster} alt={movie.title} style={{ width:'100%', height:'100%', objectFit:'cover' }} />
                          : <div style={{ width:'100%', height:'100%', display:'flex', alignItems:'center', justifyContent:'center', background:'rgba(30,41,59,0.8)', fontSize:36 }}>🎬</div>
                        }
                        {/* Bouton suppression (visible au survol) */}
                        <button
                          className="movie-delete-btn"
                          onClick={e => { e.stopPropagation(); deleteMovieWithHardlinks(movie); }}
                          title="Supprimer le film et ses hardlinks"
                          style={{ position:'absolute', top:7, left:7, width:24, height:24, borderRadius:'50%', background:'rgba(239,68,68,0.9)', border:'none', cursor:'pointer', color:'white', display:'flex', alignItems:'center', justifyContent:'center', fontSize:11, lineHeight:1, zIndex:10 }}>
                          🗑
                        </button>
                        {/* Indicateur sélection / liens OK */}
                        {isSelected && (
                          <div style={{ position:'absolute', top:8, right:8, width:22, height:22, borderRadius:'50%', background:'#3b82f6', display:'flex', alignItems:'center', justifyContent:'center', fontSize:12, fontWeight:700 }}>✓</div>
                        )}
                        {allOk && !isSelected && (
                          <div style={{ position:'absolute', top:8, right:8, width:22, height:22, borderRadius:'50%', background:'rgba(16,185,129,0.85)', display:'flex', alignItems:'center', justifyContent:'center', fontSize:11 }}>✓</div>
                        )}
                        {/* Badge vues Jellystat */}
                        {movie.jellystatEnabled && movie.watchCount > 0 && (
                          <div title={`Vu ${movie.watchCount} fois${movie.watchDates && movie.watchDates[0] ? ' · Dernière fois : ' + new Date(movie.watchDates[0]).toLocaleDateString('fr-FR') : ''}`}
                            style={{ position:'absolute', top:8, right: isSelected || allOk ? 36 : 8, background:'rgba(59,130,246,0.85)', borderRadius:10, padding:'2px 6px', fontSize:9, fontWeight:700, color:'white', display:'flex', alignItems:'center', gap:3 }}>
                            👁 {movie.watchCount}
                          </div>
                        )}
                        {/* Overlay bas : titre + statut + méta */}
                        <div style={{ position:'absolute', bottom:0, left:0, right:0, padding:'28px 8px 7px', background:'linear-gradient(to top, rgba(0,0,0,0.97) 0%, rgba(0,0,0,0.6) 60%, rgba(0,0,0,0) 100%)' }}>
                          <p style={{ fontSize:11, fontWeight:600, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>{movie.title}</p>
                          {hasErrors && <p style={{ fontSize:10, color:'#f87171', marginTop:2 }}>⚠ Liens manquants</p>}
                          {allOk && <p style={{ fontSize:10, color:'#34d399', marginTop:2 }}>✓ OK</p>}
                          {(movie.hardlinks||[]).length === 0 && <p style={{ fontSize:10, color:'rgba(100,116,139,0.7)', marginTop:2 }}>— Aucun genre</p>}
                          {/* Ligne méta : taille + date Radarr */}
                          <div style={{ display:'flex', gap:5, marginTop:3, flexWrap:'wrap', alignItems:'center' }}>
                            {movie.fileSize > 0 && (
                              <span style={{ fontSize:9, color:'rgba(148,163,184,0.65)', fontWeight:500 }}>{formatSize(movie.fileSize)}</span>
                            )}
                            {addedRadarr && (
                              <span style={{ fontSize:9, color:'rgba(100,116,139,0.55)' }}>· {addedRadarr}</span>
                            )}
                            {movie.jellystatEnabled && movie.watchCount === 0 && (
                              <span style={{ fontSize:9, color:'rgba(100,116,139,0.45)' }}>· Non vu</span>
                            )}
                          </div>
                        </div>
                      </div>
                    </div>
                  );
                })}
              </div>
            </>
          )}
        </div>
      )}

      {/* ═══════════════════════════════════════════════════════════════ */}
      {/* ISSUES VIEW (films) */}
      {/* ═══════════════════════════════════════════════════════════════ */}
      {activeView === 'issues' && (
        <div className="glass rounded-2xl p-6">
          <div className="flex items-center justify-between mb-6 gap-4">
            <div>
              <h2 className="text-lg font-bold">Problèmes Films</h2>
              <p className="text-xs mt-1" style={{ color: 'rgba(100,116,139,0.8)' }}>Orphelins, doublons et mauvais genres — via Radarr</p>
            </div>
            <button onClick={fetchDuplicates} disabled={loading}
              className="btn-primary flex items-center gap-2 text-white">
              {loading ? <Spinner size={14}/> : '🔍'} Scanner
            </button>
          </div>

          {duplicates.length === 0 ? (
            <div className="text-center py-20" style={{ color: 'rgba(100,116,139,0.7)' }}>
              <div className="text-5xl mb-4">✓</div>
              <p className="text-base font-medium">Aucun problème détecté</p>
              <p className="text-sm mt-1">Cliquez sur "Scanner" pour analyser la bibliothèque</p>
            </div>
          ) : (
            <div className="space-y-8">
              {[
                { type: 'orphan',     icon: '👻', label: 'Orphelins',    desc: 'Source supprimée de "A trier"',       color: 'rgba(239,68,68,0.1)',   border: 'rgba(239,68,68,0.25)' },
                { type: 'duplicate',  icon: '📄', label: 'Doublons',     desc: 'Ancienne version non officielle',     color: 'rgba(245,158,11,0.1)',  border: 'rgba(245,158,11,0.25)' },
                { type: 'wrong_genre',icon: '🎭', label: 'Mauvais genre', desc: 'Film dans le mauvais dossier genre', color: 'rgba(139,92,246,0.1)', border: 'rgba(139,92,246,0.25)' }
              ].map(({ type, icon, label, desc, color, border }) => {
                const items = duplicates.filter(d => d.type === type);
                if (!items.length) return null;
                // Group by movie for ignore button
                const movieNames = [...new Set(items.map(d => d.movie))];
                return (
                  <div key={type}>
                    <div className="flex justify-between items-start mb-3 gap-4">
                      <div>
                        <h3 className="text-sm font-bold">{icon} {label}
                          <span style={{ color: 'rgba(100,116,139,0.7)', fontWeight: 400 }}> ({items.length})</span>
                        </h3>
                        <p className="text-xs mt-0.5" style={{ color: 'rgba(100,116,139,0.7)' }}>{desc}</p>
                      </div>
                      <button onClick={() => deleteAllByType(type)} className="btn-danger text-white flex-shrink-0">
                        🗑 Tout supprimer
                      </button>
                    </div>
                    <div className="space-y-2">
                      {items.map((dup, idx) => (
                        <div key={idx} className="rounded-xl p-4 flex items-center gap-4"
                          style={{ background: color, border: `1px solid ${border}` }}>
                          <div className="flex-1 min-w-0">
                            <p className="text-sm font-semibold truncate">{dup.title || dup.movie}</p>
                            <p className="text-xs truncate mt-0.5" style={{ color: 'rgba(148,163,184,0.7)' }}>
                              {dup.genre} / {dup.file}
                            </p>
                            <div className="flex items-center gap-3 mt-1.5">
                              <span className="text-xs" style={{ color: '#fbbf24' }}>{dup.reason}</span>
                              <span className="text-xs" style={{ color: 'rgba(100,116,139,0.7)' }}>{formatSize(dup.size)}</span>
                            </div>
                          </div>
                          <div className="flex gap-2 flex-shrink-0">
                            <button onClick={() => ignoreMovie(dup.movie, dup.title || dup.movie)}
                              title="Ne plus afficher ce film dans les problèmes"
                              className="btn-ghost text-white/60" style={{ padding: '7px 12px' }}>
                              🚫 Ignorer
                            </button>
                            <button onClick={() => deleteDuplicate(dup.path)}
                              className="btn-danger text-white" style={{ padding: '7px 12px' }}>
                              🗑
                            </button>
                          </div>
                        </div>
                      ))}
                    </div>
                  </div>
                );
              })}
            </div>
          )}
        </div>
      )}

      {/* ═══════════════════════════════════════════════════════════════ */}
      {/* SERIES VIEW */}
      {/* ═══════════════════════════════════════════════════════════════ */}
      {activeView === 'series' && (
        <div className="glass rounded-2xl p-6">
          <div className="flex items-center justify-between mb-6 gap-4">
            <div>
              <h2 className="text-lg font-bold">Séries orphelines</h2>
              <p className="text-xs mt-1" style={{ color: 'rgba(100,116,139,0.8)' }}>
                Séries dans Check sans fichiers actifs dans Sonarr
              </p>
            </div>
            <div className="flex gap-2">
              <button onClick={fetchSeriesIssues} disabled={loading}
                className="btn-primary flex items-center gap-2 text-white">
                {loading ? <Spinner size={14}/> : '🔍'} Scanner
              </button>
              {seriesIssues.length > 0 && (
                <button onClick={deleteAllSeries} disabled={loading} className="btn-danger text-white">
                  🗑 Tout supprimer ({seriesIssues.length})
                </button>
              )}
            </div>
          </div>

          {seriesIssues.length === 0 ? (
            <div className="text-center py-20" style={{ color: 'rgba(100,116,139,0.7)' }}>
              <div className="text-5xl mb-4">📺</div>
              <p className="text-base font-medium">Aucune série orpheline</p>
              <p className="text-sm mt-1">
                Une série est orpheline si Sonarr indique 0 fichier, non monitorée, et non en téléchargement
              </p>
            </div>
          ) : (
            <div className="space-y-3">
              {seriesIssues.map((series, idx) => (
                <div key={idx} className="rounded-xl p-5 flex items-start gap-4"
                  style={{ background: 'rgba(245,158,11,0.07)', border: '1px solid rgba(245,158,11,0.2)' }}>
                  <div className="flex-1 min-w-0">
                    <div className="flex flex-wrap items-center gap-2 mb-2">
                      <h3 className="text-sm font-bold">📺 {series.series}</h3>
                      {series.fileCount > 0 && (
                        <span className="badge" style={{ background: 'rgba(245,158,11,0.15)', color: '#fbbf24' }}>
                          {series.fileCount} épisodes
                        </span>
                      )}
                      {series.size > 0 && (
                        <span className="badge" style={{ background: 'rgba(100,116,139,0.2)', color: '#94a3b8' }}>
                          {formatSize(series.size)}
                        </span>
                      )}
                      {series.sonarrPath && (
                        <span className="badge" style={{ background: 'rgba(139,92,246,0.15)', color: '#a78bfa' }}>
                          ↗ Connu de Sonarr
                        </span>
                      )}
                    </div>
                    <p className="text-xs font-mono truncate" style={{ color: 'rgba(100,116,139,0.8)' }}>
                      📁 {series.path}
                    </p>
                    {series.sonarrPath && (
                      <p className="text-xs font-mono truncate mt-0.5" style={{ color: 'rgba(100,116,139,0.6)' }}>
                        🎯 {series.sonarrPath}
                      </p>
                    )}
                    <p className="text-xs mt-2" style={{ color: '#fbbf24' }}>⚠ {series.reason}</p>
                  </div>
                  <div className="flex gap-2 flex-shrink-0">
                    <button onClick={() => ignoreSeries(series.series)}
                      title="Ne plus afficher cette série dans les orphelines"
                      className="btn-ghost text-white/60" style={{ padding: '7px 12px' }}>
                      🚫 Ignorer
                    </button>
                    <button onClick={() => deleteSeries(series.path, series.series)}
                      className="btn-danger text-white" style={{ padding: '7px 12px' }}>
                      🗑 Supprimer
                    </button>
                  </div>
                </div>
              ))}
            </div>
          )}
        </div>
      )}

      {/* ═══════════════════════════════════════════════════════════════ */}
      {/* LOGS VIEW */}
      {/* ═══════════════════════════════════════════════════════════════ */}
      {activeView === 'logs' && (
        <div className="glass rounded-2xl p-6">
          <div className="flex flex-wrap items-center justify-between gap-3 mb-5">
            <div>
              <h2 className="text-lg font-bold">Journal d'activité</h2>
              <p className="text-xs mt-1" style={{ color: 'rgba(100,116,139,0.8)' }}>
                {filteredLogs.length} entrée{filteredLogs.length !== 1 ? 's' : ''}
                {logLevel || logCategory ? ' (filtrées)' : ''}
              </p>
            </div>
            <div className="flex flex-wrap items-center gap-2">
              {/* Filters */}
              <select value={logLevel} onChange={e => setLogLevel(e.target.value)}
                className="input-field" style={{ width: 130 }}>
                <option value="">Tous niveaux</option>
                <option value="success">Succès</option>
                <option value="info">Info</option>
                <option value="warning">Avertissement</option>
                <option value="error">Erreur</option>
              </select>
              <select value={logCategory} onChange={e => setLogCategory(e.target.value)}
                className="input-field" style={{ width: 140 }}>
                <option value="">Toutes catégories</option>
                <option value="hardlink">Hardlink</option>
                <option value="series">Séries</option>
                <option value="cron">Cron</option>
                <option value="delete">Suppression</option>
                <option value="webhook">Webhook</option>
                <option value="scan">Scan</option>
                <option value="ignore">Ignoré</option>
              </select>
              <button onClick={fetchLogs} className="btn-ghost text-white/70">⟳ Rafraîchir</button>
              <label className="flex items-center gap-2 text-xs cursor-pointer select-none" style={{ color: 'rgba(148,163,184,0.8)' }}>
                <ToggleSwitch checked={logAutoRefresh} onChange={setLogAutoRefresh} />
                Auto 5s
              </label>
              <button onClick={clearLogs} className="btn-danger text-white" style={{ padding: '7px 14px' }}>
                🗑 Effacer
              </button>
            </div>
          </div>

          {filteredLogs.length === 0 ? (
            <div className="text-center py-20" style={{ color: 'rgba(100,116,139,0.7)' }}>
              <div className="text-5xl mb-4">📋</div>
              <p className="text-base font-medium">Aucun log</p>
              <p className="text-sm mt-1">Les actions (hardlinks, scans, suppressions…) apparaîtront ici</p>
            </div>
          ) : (
            <div className="rounded-xl overflow-hidden" style={{ border: '1px solid rgba(255,255,255,0.07)' }}>
              {/* Header */}
              <div className="grid px-4 py-2.5" style={{ gridTemplateColumns: '155px 80px 100px 1fr', gap: 12, background: 'rgba(255,255,255,0.03)', borderBottom: '1px solid rgba(255,255,255,0.07)', fontSize: 11, fontWeight: 600, color: 'rgba(100,116,139,0.8)', textTransform: 'uppercase', letterSpacing: '0.05em' }}>
                <span>Horodatage</span>
                <span>Niveau</span>
                <span>Catégorie</span>
                <span>Message</span>
              </div>
              {/* Rows */}
              <div className="overflow-y-auto scrollbar-thin" style={{ maxHeight: 600 }}>
                {filteredLogs.map((log, idx) => (
                  <LogRow key={idx} log={log} />
                ))}
              </div>
            </div>
          )}
        </div>
      )}

      {/* ═══════════════════════════════════════════════════════════════ */}
      {/* SETTINGS MODAL */}
      {/* ═══════════════════════════════════════════════════════════════ */}
      {showSettings && (
        <div className="fixed inset-0 flex items-center justify-center z-50 p-4"
          style={{ background: 'rgba(0,0,0,0.85)', backdropFilter: 'blur(8px)' }}
          onClick={() => setShowSettings(false)}>
          <div className="glass rounded-2xl w-full max-w-4xl flex flex-col" style={{ maxHeight: '92vh' }}
            onClick={e => e.stopPropagation()}>

            {/* Modal header */}
            <div className="flex justify-between items-center p-6" style={{ borderBottom: '1px solid rgba(255,255,255,0.07)' }}>
              <h2 className="text-lg font-bold">Paramètres</h2>
              <button onClick={() => setShowSettings(false)}
                className="w-8 h-8 flex items-center justify-center rounded-lg text-white/40 hover:text-white hover:bg-white/10 transition-all text-xl">
                ×
              </button>
            </div>

            {/* Tabs */}
            <div className="flex gap-1 px-6 pt-3" style={{ borderBottom: '1px solid rgba(255,255,255,0.07)' }}>
              {[
                { id: 'general',    label: '🔗 Connexions' },
                { id: 'paths',      label: '📁 Chemins' },
                { id: 'series',     label: '📺 Séries' },
                { id: 'automation', label: '⏰ Automatisation' },
                { id: 'genres',     label: '🎭 Genres' },
                { id: 'ignored',    label: `🚫 Exclusions${totalIgnored > 0 ? ` (${totalIgnored})` : ''}` },
              ].map(t => (
                <button key={t.id} onClick={() => setSettingsTab(t.id)}
                  className="px-4 py-2 text-xs font-medium rounded-t-lg transition-all"
                  style={{ color: settingsTab === t.id ? '#60a5fa' : 'rgba(100,116,139,0.8)', borderBottom: settingsTab === t.id ? '2px solid #3b82f6' : '2px solid transparent', background: settingsTab === t.id ? 'rgba(59,130,246,0.08)' : 'transparent' }}>
                  {t.label}
                </button>
              ))}
            </div>

            {/* Tab content */}
            <div className="flex-1 overflow-y-auto p-6 space-y-4 scrollbar-thin">

              {/* CONNEXIONS */}
              {settingsTab === 'general' && (
                <>
                  <SectionCard title="Radarr" icon="🎬">
                    <div className="grid grid-cols-2 gap-3">
                      <Field label="URL">
                        <input type="text" value={config.radarrUrl} onChange={e => setConfig({...config, radarrUrl: e.target.value})} className="input-field" placeholder="http://radarr:7878" />
                      </Field>
                      <Field label="Clé API">
                        <input type="password" value={config.apiKey} onChange={e => setConfig({...config, apiKey: e.target.value})} className="input-field" placeholder="••••••••••••••••" />
                      </Field>
                    </div>
                  </SectionCard>
                  <SectionCard title="Sonarr" icon="📺">
                    <div className="grid grid-cols-2 gap-3">
                      <Field label="URL">
                        <input type="text" value={config.sonarrUrl || ''} onChange={e => setConfig({...config, sonarrUrl: e.target.value})} className="input-field" placeholder="http://sonarr:8989" />
                      </Field>
                      <Field label="Clé API">
                        <input type="password" value={config.sonarrApiKey || ''} onChange={e => setConfig({...config, sonarrApiKey: e.target.value})} className="input-field" placeholder="••••••••••••••••" />
                      </Field>
                    </div>
                  </SectionCard>
                  <SectionCard title="Jellystat" icon="📊">
                    <div className="grid grid-cols-2 gap-3">
                      <Field label="URL Jellystat" hint="ex: http://jellystat:3000">
                        <input type="text" value={config.jellystatUrl || ''} onChange={e => setConfig({...config, jellystatUrl: e.target.value})} className="input-field" placeholder="http://jellystat:3000" />
                      </Field>
                      <Field label="Clé API Jellystat">
                        <input type="password" value={config.jellystatApiKey || ''} onChange={e => setConfig({...config, jellystatApiKey: e.target.value})} className="input-field" placeholder="••••••••••••••••" />
                      </Field>
                    </div>
                    <p className="text-xs" style={{ color: 'rgba(100,116,139,0.7)' }}>
                      Affiche le nombre de vues et l'historique de visionnage dans la bibliothèque (via <code style={{ fontSize:10 }}>/api/getItemsPlaybackActivity</code>).
                      La clé API se génère dans Jellystat → Paramètres → API Key.
                    </p>
                  </SectionCard>
                  <SectionCard title="Propriétaire des fichiers" icon="👤">
                    <div className="grid grid-cols-2 gap-3">
                      <Field label="Utilisateur (chown)" hint="Laissez vide pour ne pas modifier">
                        <input type="text" value={config.ownerUser} onChange={e => setConfig({...config, ownerUser: e.target.value})} className="input-field" placeholder="media" />
                      </Field>
                      <Field label="Groupe (GID ou nom)" hint="Laissez vide pour ne pas modifier">
                        <input type="text" value={config.ownerGroup} onChange={e => setConfig({...config, ownerGroup: e.target.value})} className="input-field" placeholder="1000" />
                      </Field>
                    </div>
                  </SectionCard>
                </>
              )}

              {/* CHEMINS */}
              {settingsTab === 'paths' && (
                <SectionCard title="Chemins Films" icon="🎬">
                  <Field label='Source "A trier"' hint="Dossier où arrivent les fichiers originaux">
                    <input type="text" value={config.sourceRoot} onChange={e => setConfig({...config, sourceRoot: e.target.value})} className="input-field font-mono text-xs" />
                  </Field>
                  <Field label="Destination (racine bibliothèque)" hint="Racine des dossiers par genre">
                    <input type="text" value={config.mediaRoot} onChange={e => setConfig({...config, mediaRoot: e.target.value})} className="input-field font-mono text-xs" />
                  </Field>
                </SectionCard>
              )}

              {/* SÉRIES */}
              {settingsTab === 'series' && (
                <SectionCard title="Vérification des séries orphelines" icon="📺"
                  toggle={config.seriesCheck?.enabled || false}
                  onToggle={v => setConfig({...config, seriesCheck: {...config.seriesCheck, enabled: v}})}>
                  <Field label="Dossier Source (géré par Sonarr)" hint="Référence optionnelle si Sonarr n'est pas configuré">
                    <input type="text" value={config.seriesSourceRoot || ''} onChange={e => setConfig({...config, seriesSourceRoot: e.target.value})} className="input-field font-mono text-xs" placeholder="/media/series/Source" />
                  </Field>
                  <Field label="Dossier Check (à vérifier)" hint="Ce dossier est scanné pour détecter les orphelines">
                    <input type="text" value={config.seriesCheckRoot || ''} onChange={e => setConfig({...config, seriesCheckRoot: e.target.value})} className="input-field font-mono text-xs" placeholder="/media/series/Check" />
                  </Field>
                  <div className="rounded-xl p-4" style={{ background: 'rgba(59,130,246,0.08)', border: '1px solid rgba(59,130,246,0.2)' }}>
                    <p className="text-xs leading-relaxed" style={{ color: 'rgba(147,197,253,0.9)' }}>
                      <strong>Détection :</strong> Pour chaque dossier dans Check, l'API Sonarr est consultée.
                      Une série est <strong>orpheline</strong> uniquement si Sonarr indique 0 fichier,
                      non monitorée, et non en téléchargement. Utilisez le bouton <strong>Ignorer</strong> pour
                      exclure une série de cette liste sans la supprimer.
                    </p>
                  </div>
                </SectionCard>
              )}

              {/* AUTOMATISATION */}
              {settingsTab === 'automation' && (
                <>
                  <SectionCard title="Hardlinks Films (automatique)" icon="🎬"
                    toggle={config.autoSync?.enabled || false}
                    onToggle={v => setConfig({...config, autoSync: {...config.autoSync, enabled: v}})}>
                    <Field label="Planification cron" hint="Exemple : 0 */6 * * * = toutes les 6h">
                      <input type="text" value={config.autoSync?.cronSchedule || '0 */6 * * *'} onChange={e => setConfig({...config, autoSync: {...config.autoSync, cronSchedule: e.target.value}})} className="input-field font-mono text-xs" />
                    </Field>
                    <div className="grid grid-cols-2 gap-3">
                      <Field label="Dernier run">
                        <p className="text-xs px-3 py-2.5 rounded-lg" style={{ background: 'rgba(255,255,255,0.04)', color: 'rgba(148,163,184,0.8)' }}>{formatDate(config.autoSync?.lastRun)}</p>
                      </Field>
                      <Field label="Dernier scan complet">
                        <p className="text-xs px-3 py-2.5 rounded-lg" style={{ background: 'rgba(255,255,255,0.04)', color: 'rgba(148,163,184,0.8)' }}>{formatDate(config.autoSync?.lastFullScan)}</p>
                      </Field>
                    </div>
                    <label className="flex items-center gap-3 cursor-pointer">
                      <ToggleSwitch checked={config.scanOptimization?.enabled !== false} onChange={v => setConfig({...config, scanOptimization: {...config.scanOptimization, enabled: v}})} />
                      <div>
                        <p className="text-xs font-medium">Scan optimisé</p>
                        <p className="text-xs" style={{ color: 'rgba(100,116,139,0.7)' }}>Scanne uniquement les films récents entre les scans complets</p>
                      </div>
                    </label>
                    {config.scanOptimization?.enabled !== false && (
                      <div className="grid grid-cols-2 gap-3 ml-12">
                        <Field label="Fenêtre récents (heures)">
                          <input type="number" value={config.scanOptimization?.recentHours || 3} onChange={e => setConfig({...config, scanOptimization: {...config.scanOptimization, recentHours: parseInt(e.target.value)}})} className="input-field text-sm" min="1" />
                        </Field>
                        <Field label="Scan complet toutes les (heures)">
                          <input type="number" value={config.scanOptimization?.fullScanInterval || 24} onChange={e => setConfig({...config, scanOptimization: {...config.scanOptimization, fullScanInterval: parseInt(e.target.value)}})} className="input-field text-sm" min="1" />
                        </Field>
                      </div>
                    )}
                  </SectionCard>

                  <SectionCard title="Vérification Séries (automatique)" icon="📺"
                    toggle={config.seriesAutoCheck?.enabled || false}
                    onToggle={v => setConfig({...config, seriesAutoCheck: {...config.seriesAutoCheck, enabled: v}})}>
                    <Field label="Planification cron" hint="Exemple : 0 */12 * * * = toutes les 12h">
                      <input type="text" value={config.seriesAutoCheck?.cronSchedule || '0 */12 * * *'} onChange={e => setConfig({...config, seriesAutoCheck: {...config.seriesAutoCheck, cronSchedule: e.target.value}})} className="input-field font-mono text-xs" />
                    </Field>
                    <Field label="Dernier run">
                      <p className="text-xs px-3 py-2.5 rounded-lg" style={{ background: 'rgba(255,255,255,0.04)', color: 'rgba(148,163,184,0.8)' }}>{formatDate(config.seriesAutoCheck?.lastRun)}</p>
                    </Field>
                  </SectionCard>

                  {cronStatus && (
                    <SectionCard title="Jobs planifiés actifs" icon="⏰">
                      {!cronStatus.jobs?.length ? (
                        <p className="text-xs" style={{ color: 'rgba(100,116,139,0.7)' }}>Aucun job actif</p>
                      ) : (
                        <div className="space-y-2">
                          {(cronStatus.jobs || []).map((job, i) => (
                            <div key={i} className="flex justify-between items-center p-3 rounded-lg" style={{ background: 'rgba(255,255,255,0.04)' }}>
                              <div>
                                <p className="text-xs font-semibold">{job.id === 'auto_hardlink' ? '🎬 Films' : '📺 Séries'}</p>
                                <p className="text-xs mt-0.5" style={{ color: 'rgba(100,116,139,0.7)' }}>{job.trigger}</p>
                              </div>
                              <div className="text-right">
                                <p className="text-xs" style={{ color: 'rgba(100,116,139,0.7)' }}>Prochain</p>
                                <p className="text-xs font-mono mt-0.5" style={{ color: '#34d399' }}>{job.next_run ? formatDate(job.next_run) : '—'}</p>
                              </div>
                            </div>
                          ))}
                        </div>
                      )}
                    </SectionCard>
                  )}

                  <SectionCard title="Webhooks" icon="🔔"
                    toggle={config.webhookEnabled || false}
                    onToggle={v => setConfig({...config, webhookEnabled: v})}>
                    <Field label="Secret (optionnel)" hint="Laissez vide pour désactiver la vérification">
                      <input type="password" value={config.webhookSecret || ''} onChange={e => setConfig({...config, webhookSecret: e.target.value})} className="input-field text-xs" placeholder="secret" />
                    </Field>
                    <div className="rounded-lg p-3 space-y-1" style={{ background: 'rgba(255,255,255,0.04)' }}>
                      <p className="text-xs" style={{ color: 'rgba(100,116,139,0.7)' }}>Endpoints disponibles :</p>
                      <p className="text-xs font-mono" style={{ color: '#60a5fa' }}>POST /api/webhook/radarr</p>
                      <p className="text-xs font-mono" style={{ color: '#60a5fa' }}>POST /api/webhook/jellyfin</p>
                    </div>
                  </SectionCard>
                </>
              )}

              {/* GENRES */}
              {settingsTab === 'genres' && (
                <SectionCard title="Mapping Genres → Dossiers" icon="🎭"
                  action={<button onClick={fetchAllGenres} className="btn-primary text-white text-xs px-3 py-1.5">Charger depuis Radarr</button>}>
                  {allGenres.length === 0 ? (
                    <p className="text-xs text-center py-6" style={{ color: 'rgba(100,116,139,0.7)' }}>
                      Cliquez sur "Charger depuis Radarr" pour obtenir la liste des genres
                    </p>
                  ) : (
                    <div className="grid grid-cols-2 gap-2">
                      {allGenres.map(genre => (
                        <div key={genre.name} className="p-3 rounded-xl transition-all"
                          style={{ background: genre.enabled ? 'rgba(59,130,246,0.08)' : 'rgba(255,255,255,0.03)', border: `1px solid ${genre.enabled ? 'rgba(59,130,246,0.3)' : 'rgba(255,255,255,0.06)'}`, opacity: genre.enabled ? 1 : 0.55 }}>
                          <div className="flex items-center gap-2 mb-2">
                            <ToggleSwitch checked={genre.enabled} onChange={v => {
                              updateGenreMapping(genre.name, 'enabled', v);
                              setAllGenres(allGenres.map(g => g.name === genre.name ? {...g, enabled: v} : g));
                            }} />
                            <span className="text-xs font-semibold">{genre.name}</span>
                          </div>
                          <input type="text" value={genre.folder} onChange={e => {
                            updateGenreMapping(genre.name, 'folder', e.target.value);
                            setAllGenres(allGenres.map(g => g.name === genre.name ? {...g, folder: e.target.value} : g));
                          }} className="input-field text-xs font-mono" placeholder="Nom du dossier" disabled={!genre.enabled} />
                        </div>
                      ))}
                    </div>
                  )}
                </SectionCard>
              )}

              {/* EXCLUSIONS */}
              {settingsTab === 'ignored' && (
                <div className="space-y-4">
                  <div className="rounded-xl p-4" style={{ background: 'rgba(59,130,246,0.08)', border: '1px solid rgba(59,130,246,0.2)' }}>
                    <p className="text-xs leading-relaxed" style={{ color: 'rgba(147,197,253,0.9)' }}>
                      Les éléments exclus n'apparaissent plus dans les listes d'orphelins et de problèmes.
                      Aucun fichier n'est supprimé. Pour les retirer de l'exclusion, cliquez sur <strong>×</strong>.
                    </p>
                  </div>

                  <SectionCard title="Séries exclues" icon="📺">
                    {!(ignored.series || []).length ? (
                      <p className="text-xs" style={{ color: 'rgba(100,116,139,0.6)' }}>Aucune série exclue</p>
                    ) : (
                      <div className="space-y-2">
                        {(ignored.series || []).map((name, i) => (
                          <div key={i} className="flex items-center justify-between p-3 rounded-lg" style={{ background: 'rgba(255,255,255,0.04)' }}>
                            <span className="text-xs font-medium">📺 {name}</span>
                            <button onClick={() => removeIgnored('series', name)}
                              className="text-xs px-2 py-1 rounded transition-all hover:bg-white/10" style={{ color: 'rgba(239,68,68,0.8)' }}>
                              × Retirer
                            </button>
                          </div>
                        ))}
                      </div>
                    )}
                  </SectionCard>

                  <SectionCard title="Films exclus" icon="🎬">
                    {!(ignored.movies || []).length ? (
                      <p className="text-xs" style={{ color: 'rgba(100,116,139,0.6)' }}>Aucun film exclu</p>
                    ) : (
                      <div className="space-y-2">
                        {(ignored.movies || []).map((name, i) => (
                          <div key={i} className="flex items-center justify-between p-3 rounded-lg" style={{ background: 'rgba(255,255,255,0.04)' }}>
                            <span className="text-xs font-medium">🎬 {name}</span>
                            <button onClick={() => removeIgnored('movies', name)}
                              className="text-xs px-2 py-1 rounded transition-all hover:bg-white/10" style={{ color: 'rgba(239,68,68,0.8)' }}>
                              × Retirer
                            </button>
                          </div>
                        ))}
                      </div>
                    )}
                  </SectionCard>
                </div>
              )}
            </div>

            {/* Footer */}
            <div className="p-5" style={{ borderTop: '1px solid rgba(255,255,255,0.07)' }}>
              <button onClick={saveConfig} className="btn-primary w-full text-white text-sm font-bold py-3">
                💾 Sauvegarder la configuration
              </button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
};

// ─── Log Row component ────────────────────────────────────────────────────────
const LogRow = ({ log }) => {
  const [expanded, setExpanded] = useState(false);
  const levelColors = { success: '#34d399', error: '#f87171', warning: '#fbbf24', info: '#60a5fa' };
  const lc = levelColors[log.level] || '#94a3b8';

  return (
    <div className="log-row" style={{ borderBottom: '1px solid rgba(255,255,255,0.04)' }}>
      <div className="grid px-4 py-2.5 items-center"
        style={{ gridTemplateColumns: '155px 80px 100px 1fr', gap: 12, cursor: log.details ? 'pointer' : 'default' }}
        onClick={() => log.details && setExpanded(!expanded)}>
        <span className="text-xs font-mono" style={{ color: 'rgba(100,116,139,0.7)' }}>
          {new Date(log.timestamp).toLocaleString('fr-FR', { day:'2-digit', month:'2-digit', hour:'2-digit', minute:'2-digit', second:'2-digit' })}
        </span>
        <span>
          <span className="badge text-xs" style={{ background: `${lc}18`, color: lc }}>
            {log.level === 'success' ? '✓ OK' : log.level === 'error' ? '✕ Err' : log.level === 'warning' ? '⚠ Avert' : 'ℹ Info'}
          </span>
        </span>
        <span><CategoryBadge category={log.category} /></span>
        <div className="flex items-center gap-2 min-w-0">
          <span className="text-xs truncate" style={{ color: 'rgba(203,213,225,0.9)' }}>{log.message}</span>
          {log.details && (
            <span style={{ color: 'rgba(100,116,139,0.5)', fontSize: 10 }}>{expanded ? '▲' : '▼'}</span>
          )}
        </div>
      </div>
      {expanded && log.details && (
        <div className="px-4 pb-3">
          <pre className="text-xs rounded-lg p-3 overflow-x-auto scrollbar-thin"
            style={{ background: 'rgba(0,0,0,0.3)', color: 'rgba(148,163,184,0.8)', fontFamily: 'monospace', fontSize: 11 }}>
            {JSON.stringify(log.details, null, 2)}
          </pre>
        </div>
      )}
    </div>
  );
};

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
