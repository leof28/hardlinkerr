version: '3.8'

services:
  radarr-manager:
    build: .
    container_name: radarr-manager
    ports:
      - "5550:5000"
    volumes:
      # IMPORTANT: Mount the common root to allow hardlinks (same filesystem)
      - /YOUR/MEDIA/PATH:/media
      # Persistent configuration
      - /YOUR/MEDIA/PATH/config:/app/config
    environment:
      - RADARR_URL=http://YOUR_NAS_IP:7878
      - API_KEY=YOUR_RADARR_API_KEY
      - SOURCE_ROOT=/media/movies/Unsorted
      - MEDIA_ROOT=/media/movies
      - OWNER_USER=1000  # Your NAS user UID (run: id -u)
      - OWNER_GROUP=1000 # Your NAS group GID (run: id -g)
      - TZ=America/Toronto  # Your timezone: https://en.wikipedia.org/wiki/List_of_tz_database_time_zones
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 512M
